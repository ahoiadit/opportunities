const CommandPalette = ({ open, onClose, onNavigate, userRole, opportunities }) => {
  const [query, setQuery] = useState('');
  const [activeIdx, setActiveIdx] = useState(0);
  const inputRef = React.useRef(null);
  const OPPS = opportunities && opportunities.length ? opportunities : ALL_OPPORTUNITIES;

  // Build searchable index
  const allItems = useMemo(() => {
    const items = [];
    // Navigation items
    if (userRole === 'superadmin') {
      [
        ['admin-overview', 'System Overview', 'NAV'],
        ['admin-users', 'User Management', 'NAV'],
        ['admin-companies', 'Companies', 'NAV'],
        ['admin-opportunities', 'Opportunities DB', 'NAV'],
        ['admin-data', 'Data Editor', 'NAV'],
        ['admin-market', 'Market Intelligence', 'NAV'],
        ['admin-standards', 'Standards Registry', 'NAV'],
        ['admin-analytics', 'Analytics', 'NAV'],
      ].forEach(([id, label, tag]) => items.push({ type: 'nav', id, title: label, desc: 'Buka view', tag, icon: 'home' }));
    } else {
      [
        ['overview', 'Overview', 'NAV', 'home'],
        ['profile', 'Profil Perusahaan', 'NAV', 'user'],
        ['opportunities', 'Climate Opportunities', 'NAV', 'leaf'],
        ['esg-rating', 'ESG Rating', 'NAV', 'target'],
        ['emissions', 'GHG Calculator', 'NAV', 'factory'],
        ['risks', 'Risk Heatmap', 'NAV', 'shield'],
        ['scenarios', 'Scenario Analysis', 'NAV', 'globe'],
        ['roadmap', 'Decarb Roadmap', 'NAV', 'rocket'],
        ['peer-benchmark', 'Peer Benchmark', 'NAV', 'chart'],
        ['feasibility', 'Feasibility Calculator', 'NAV', 'calculator'],
      ].forEach(([id, label, tag, icon]) => items.push({ type: 'nav', id, title: label, desc: 'Buka view', tag, icon }));
    }
    // Opportunities
    OPPS.forEach(opp => items.push({
      type: 'opp', id: opp.id, title: opp.title,
      desc: `${opp.category} · CAPEX Rp ${opp.capex}M · Payback ${opp.payback}y · ${opp.emissionCut} tCO₂e/y`,
      tag: 'OPP', icon: 'leaf', goto: 'opportunities'
    }));
    // Standards
    [
      ['PSPK 1', 'Pengungkapan Umum Pelaporan Keberlanjutan', 'IFRS S1 ekuivalen'],
      ['PSPK 2', 'Pengungkapan terkait Iklim', 'IFRS S2 ekuivalen'],
      ['TCFD', 'Task Force on Climate-related Financial Disclosures', '4 pilar disclosure'],
      ['GRI 305', 'Emissions Standard', 'Scope 1, 2, 3 disclosure'],
      ['SBTi', 'Science-Based Targets initiative', 'Validasi target 1.5°C'],
      ['IDXCarbon', 'Bursa Karbon Indonesia', 'Aktif sejak 2023'],
    ].forEach(([code, name, desc]) => items.push({
      type: 'std', id: code, title: `${code} — ${name}`, desc, tag: 'STD', icon: 'book', goto: 'compliance'
    }));
    // Compliance topics
    [
      ['Governance', 'Tata kelola iklim · Oversight Dewan Komisaris'],
      ['Strategy', 'Strategi iklim · Skenario 1.5°C / 2°C / 3°C'],
      ['Risk Management', 'Identifikasi & assessment risiko iklim'],
      ['Metrics & Targets', 'KPI · Scope 1/2/3 · Carbon intensity'],
      ['Materiality', 'Double materiality assessment'],
      ['Scope 3', 'Value chain emissions · 15 kategori GHG Protocol'],
    ].forEach(([t, d]) => items.push({
      type: 'topic', id: t, title: t, desc: d, tag: 'TOPIC', icon: 'check', goto: 'compliance'
    }));
    return items;
  }, [userRole, OPPS]);

  // Filter
  const results = useMemo(() => {
    if (!query.trim()) return allItems.slice(0, 12);
    const q = query.toLowerCase();
    return allItems.filter(it =>
      it.title.toLowerCase().includes(q) ||
      it.desc.toLowerCase().includes(q) ||
      it.id.toLowerCase().includes(q)
    ).slice(0, 20);
  }, [query, allItems]);

  useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus();
    setActiveIdx(0);
    setQuery('');
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (e.key === 'Escape') { onClose(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, results.length - 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
      else if (e.key === 'Enter') {
        const r = results[activeIdx];
        if (r) handleSelect(r);
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [open, results, activeIdx]);

  const handleSelect = (item) => {
    if (item.type === 'nav') onNavigate(item.id);
    else if (item.goto) onNavigate(item.goto);
    onClose();
  };

  if (!open) return null;

  // Group results by type
  const grouped = {};
  results.forEach(r => { (grouped[r.tag] = grouped[r.tag] || []).push(r); });
  const groupOrder = ['NAV', 'OPP', 'STD', 'TOPIC'];
  const groupNames = { NAV: 'Navigasi', OPP: 'Climate Opportunities', STD: 'Standar & Regulasi', TOPIC: 'Topik Compliance' };

  return (
    <div className="cmd-backdrop" onClick={onClose}>
      <div className="cmd-panel" onClick={e => e.stopPropagation()}>
        <div className="cmd-input-row">
          <Icon name="search" size={18} />
          <input
            ref={inputRef}
            className="cmd-input"
            placeholder="Cari peluang, standar, view, atau topik…"
            value={query}
            onChange={e => { setQuery(e.target.value); setActiveIdx(0); }}
          />
          <kbd style={{fontFamily:'var(--font-mono)',fontSize:'9px',padding:'3px 7px',background:'var(--bg-base)',border:'1px solid var(--border-soft)',borderRadius:'4px',color:'var(--text-muted)'}}>ESC</kbd>
        </div>
        <div className="cmd-results">
          {results.length === 0 ? (
            <div className="cmd-empty">Tidak ada hasil untuk "{query}"</div>
          ) : (
            groupOrder.map(g => grouped[g] && (
              <div key={g}>
                <div className="cmd-section-title">→ {groupNames[g]}</div>
                {grouped[g].map((r, idx) => {
                  const globalIdx = results.indexOf(r);
                  return (
                    <div
                      key={r.type + r.id}
                      className={`cmd-item ${globalIdx === activeIdx ? 'active' : ''}`}
                      onClick={() => handleSelect(r)}
                      onMouseEnter={() => setActiveIdx(globalIdx)}
                    >
                      <div className="cmd-item-icon">
                        <Icon name={r.icon} size={14} />
                      </div>
                      <div className="cmd-item-body">
                        <div className="cmd-item-title">{r.title}</div>
                        <div className="cmd-item-desc">{r.desc}</div>
                      </div>
                      <div className="cmd-item-tag">{r.tag}</div>
                    </div>
                  );
                })}
              </div>
            ))
          )}
        </div>
        <div className="cmd-footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> Navigasi</span>
          <span><kbd>↵</kbd> Pilih</span>
          <span><kbd>ESC</kbd> Tutup</span>
          <span style={{marginLeft:'auto'}}>{results.length} hasil</span>
        </div>
      </div>
    </div>
  );
};

// Sector benchmark data — derived from KPI tracker IESR + OJK emiten study 2025
const SECTOR_BENCHMARKS = {
  'Manufacturing': { disclosure: 58, intensity: 72, commitment: 45, capex: 38, scope12: 80, scope3: 22 },
  'Energy & Utilities': { disclosure: 68, intensity: 55, commitment: 62, capex: 55, scope12: 92, scope3: 38 },
  'Mining & Metals': { disclosure: 65, intensity: 42, commitment: 58, capex: 48, scope12: 88, scope3: 35 },
  'Transportation & Logistics': { disclosure: 48, intensity: 62, commitment: 35, capex: 30, scope12: 70, scope3: 18 },
  'Real Estate & Construction': { disclosure: 52, intensity: 68, commitment: 40, capex: 32, scope12: 65, scope3: 15 },
  'Financial Services': { disclosure: 75, intensity: 88, commitment: 68, capex: 25, scope12: 78, scope3: 42 },
  'Agriculture & Food': { disclosure: 50, intensity: 70, commitment: 38, capex: 28, scope12: 60, scope3: 25 },
  'Consumer Goods': { disclosure: 55, intensity: 75, commitment: 42, capex: 32, scope12: 72, scope3: 20 },
};
const TOP_QUARTILE = { disclosure: 85, intensity: 90, commitment: 80, capex: 72, scope12: 96, scope3: 65 };

const PeerBenchmark = ({ profile }) => {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);

  // Compute user's score based on profile
  const userScore = useMemo(() => {
    if (!profile) return { disclosure: 35, intensity: 50, commitment: 30, capex: 28, scope12: 55, scope3: 12 };
    const decarbScore = Math.min(100, Math.round(profile.decarbTarget * 1.8));
    const capexScore = Math.min(100, Math.round((profile.capexBudget / (profile.totalAsset || 1)) * 1000));
    const baseIntensity = profile.baselineEmission && profile.revenue ? profile.baselineEmission / profile.revenue : 1.5;
    const intensityScore = Math.max(20, Math.min(100, Math.round(80 - baseIntensity * 8)));
    return {
      disclosure: 52,
      intensity: intensityScore,
      commitment: decarbScore,
      capex: capexScore,
      scope12: 68,
      scope3: 18,
    };
  }, [profile]);

  const sector = profile?.industry || 'Manufacturing';
  const benchmark = SECTOR_BENCHMARKS[sector] || SECTOR_BENCHMARKS['Manufacturing'];

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Climate Disclosure', 'Carbon Intensity', 'Decarb Commitment', 'Climate CAPEX', 'Scope 1+2 Coverage', 'Scope 3 Coverage'],
        datasets: [
          {
            label: 'Top Quartile (IDX)',
            data: [TOP_QUARTILE.disclosure, TOP_QUARTILE.intensity, TOP_QUARTILE.commitment, TOP_QUARTILE.capex, TOP_QUARTILE.scope12, TOP_QUARTILE.scope3],
            backgroundColor: 'rgba(252, 211, 77, 0.08)',
            borderColor: 'rgba(252, 211, 77, 0.8)',
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointBackgroundColor: '#FCD34D',
            pointRadius: 3,
          },
          {
            label: `Sektor Median (${sector})`,
            data: [benchmark.disclosure, benchmark.intensity, benchmark.commitment, benchmark.capex, benchmark.scope12, benchmark.scope3],
            backgroundColor: 'rgba(122, 174, 216, 0.18)',
            borderColor: 'rgba(59, 118, 192, 0.6)',
            borderWidth: 2,
            pointBackgroundColor: '#3B76C0',
            pointRadius: 4,
          },
          {
            label: profile?.companyName || 'Posisi Anda',
            data: [userScore.disclosure, userScore.intensity, userScore.commitment, userScore.capex, userScore.scope12, userScore.scope3],
            backgroundColor: 'rgba(90, 170, 237, 0.25)',
            borderColor: '#5AAAED',
            borderWidth: 2.5,
            pointBackgroundColor: '#5AAAED',
            pointRadius: 5,
            pointHoverRadius: 7,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              font: { family: 'Aptos', size: 11 },
              boxWidth: 12,
              padding: 12,
              usePointStyle: true,
              color: '#52525B',
            },
          },
          tooltip: {
            backgroundColor: '#142035',
            titleFont: { family: 'Helvetica Neue', weight: 700, size: 12 },
            bodyFont: { family: 'Aptos', size: 11 },
            padding: 12,
            cornerRadius: 8,
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${ctx.raw}/100`,
            },
          },
        },
        scales: {
          r: {
            min: 0,
            max: 100,
            ticks: {
              stepSize: 20,
              font: { family: 'Aptos', size: 9 },
              color: '#A1A1AA',
              backdropColor: 'transparent',
            },
            grid: { color: 'rgba(59, 118, 192, 0.12)' },
            angleLines: { color: 'rgba(59, 118, 192, 0.18)' },
            pointLabels: {
              font: { family: 'Aptos', size: 11, weight: '600' },
              color: '#27272A',
            },
          },
        },
      },
    });

    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [userScore, benchmark, sector, profile]);

  // Compute average position
  const userAvg = Math.round((userScore.disclosure + userScore.intensity + userScore.commitment + userScore.capex + userScore.scope12 + userScore.scope3) / 6);
  const sectorAvg = Math.round((benchmark.disclosure + benchmark.intensity + benchmark.commitment + benchmark.capex + benchmark.scope12 + benchmark.scope3) / 6);
  const gap = userAvg - sectorAvg;
  const percentile = userAvg >= 75 ? 'Top 25%' : userAvg >= 55 ? 'Top 50%' : userAvg >= 35 ? 'Bottom 50%' : 'Bottom 25%';

  return (
    <div className="peer-card">
      <div className="peer-header">
        <div>
          <div className="section-eyebrow">→ Peer Benchmarking</div>
          <h3 className="section-title" style={{marginBottom:4}}>Posisi vs. Sektor IDX</h3>
          <div style={{fontSize:13,color:'var(--text-muted)'}}>
            Skor agregat 6 dimensi · {sector} · n=42 emiten
          </div>
        </div>
        <div className="status-chip warn" style={{fontFamily:'var(--font-mono)',fontSize:10}}>
          BENCHMARK · 2025
        </div>
      </div>
      <div style={{position:'relative',height:340,marginTop:8}}>
        <canvas ref={canvasRef}></canvas>
      </div>
      <div className="peer-summary">
        <div className="peer-summary-item">
          <div className="peer-summary-label">Skor Anda</div>
          <div className="peer-summary-value">{userAvg}<span style={{fontSize:14,color:'var(--text-muted)'}}>/100</span></div>
          <div className={`peer-summary-tag ${gap > 0 ? 'up' : gap < 0 ? 'down' : 'neutral'}`}>
            {gap > 0 ? `▲ +${gap} dari median` : gap < 0 ? `▼ ${gap} dari median` : '= di median'}
          </div>
        </div>
        <div className="peer-summary-item">
          <div className="peer-summary-label">Median Sektor</div>
          <div className="peer-summary-value">{sectorAvg}<span style={{fontSize:14,color:'var(--text-muted)'}}>/100</span></div>
          <div className="peer-summary-tag neutral">{sector}</div>
        </div>
        <div className="peer-summary-item">
          <div className="peer-summary-label">Persentil</div>
          <div className="peer-summary-value" style={{color:'var(--purple-700)'}}>{percentile}</div>
          <div className="peer-summary-tag neutral">Emiten IDX</div>
        </div>
      </div>
    </div>
  );
};

// DATA STORE — Editable State + LocalStorage Persistence
// =======================================
const DATA_STORAGE_KEY = 'cesgs_dashboard_data_v1';

const safeLoad = (key) => {
  try {
    if (typeof window === 'undefined' || !window.localStorage) return null;
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
};

const safeSave = (key, value) => {
  try {
    if (typeof window === 'undefined' || !window.localStorage) return false;
    window.localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) { return false; }
};

const DEFAULT_INDUSTRIES = INDUSTRIES;

// Generate next ID for collection given prefix
const nextId = (collection, prefix) => {
  const nums = collection
    .map(it => parseInt(String(it.id).replace(/[^0-9]/g, '')))
    .filter(n => !isNaN(n));
  const max = nums.length ? Math.max(...nums) : 0;
  return `${prefix}${String(max + 1).padStart(3, '0')}`;
};

const useDataStore = () => {
  const stored = safeLoad(DATA_STORAGE_KEY) || {};
  const [opportunities, setOpportunities] = useState(stored.opportunities || ALL_OPPORTUNITIES);
  const [complianceItems, setComplianceItems] = useState(stored.complianceItems || COMPLIANCE_ITEMS);
  const [climateRisks, setClimateRisks] = useState(stored.climateRisks || CLIMATE_RISKS);
  const [materialityTopics, setMaterialityTopics] = useState(stored.materialityTopics || MATERIALITY_TOPICS);
  const [scenarios, setScenarios] = useState(stored.scenarios || SCENARIOS);
  const [notifications, setNotifications] = useState(stored.notifications || NOTIFICATIONS);
  const [industries, setIndustries] = useState(stored.industries || DEFAULT_INDUSTRIES);
  const [companyDB, setCompanyDB] = useState(stored.companyDB || COMPANY_DB_DEFAULTS);
  const [modelParams, setModelParamsState] = useState(stored.modelParams || { ...MODEL_PARAM_DEFAULTS });
  // ESG Ratings — persisted separately (shared with login/register)
  const [esgRatings, setEsgRatingsState] = useState(ESG_RATINGS_STORE);
  const [registeredUsers, setRegisteredUsersState] = useState(ACCOUNTS);

  // Persist on any change
  useEffect(() => {
    safeSave(DATA_STORAGE_KEY, {
      opportunities, complianceItems, climateRisks, materialityTopics,
      scenarios, notifications, industries, companyDB, modelParams,
    });
  }, [opportunities, complianceItems, climateRisks, materialityTopics, scenarios, notifications, industries, companyDB, modelParams]);

  // Sinkronkan ke variabel formula tingkat-modul agar dashboard user ikut ter-update
  useEffect(() => { COMPANY_DB = companyDB; }, [companyDB]);
  useEffect(() => {
    CONV_DEFAULT = { elecTariff: +modelParams.elecTariff || 1450, fuelPrice: +modelParams.fuelPrice || 13000, gridEF: +modelParams.gridEF || 0.79, fuelEF: +modelParams.fuelEF || 2.68 };
    SCOPE3_FACTOR = +modelParams.scope3Factor || 0.31;
    USD_IDR_RATE = +modelParams.usdIdr || 16000;
    FIN_DEFAULTS = { wacc: +modelParams.wacc || 8, horizon: +modelParams.horizon || 10, taxRate: +modelParams.taxRate ?? 22, energyEsc: +modelParams.energyEsc ?? 5 };
    TIER_PARAMS = { lowPaybackMax: +modelParams.lowPaybackMax || 4.5 };
  }, [modelParams]);

  useEffect(() => { saveEsgRatings(esgRatings); ESG_RATINGS_STORE = esgRatings; }, [esgRatings]);
  useEffect(() => { saveAccounts(registeredUsers); ACCOUNTS = registeredUsers; }, [registeredUsers]);

  // Generic CRUD factory
  const makeCRUD = (state, setState, prefix) => ({
    add: (item) => setState(prev => [...prev, { ...item, id: item.id || nextId(prev, prefix) }]),
    update: (id, changes) => setState(prev => prev.map(it => it.id === id ? { ...it, ...changes } : it)),
    remove: (id) => setState(prev => prev.filter(it => it.id !== id)),
    replace: (newList) => setState(newList),
  });

  const setEsgRatings = (fn) => setEsgRatingsState(typeof fn === 'function' ? fn : () => fn);
  const setRegisteredUsers = (fn) => setRegisteredUsersState(typeof fn === 'function' ? fn : () => fn);
  const setModelParams = (fn) => setModelParamsState(typeof fn === 'function' ? fn : () => fn);

  const resetAll = () => {
    try { window.localStorage.removeItem(DATA_STORAGE_KEY); } catch (e) {}
    setOpportunities(ALL_OPPORTUNITIES);
    setComplianceItems(COMPLIANCE_ITEMS);
    setClimateRisks(CLIMATE_RISKS);
    setMaterialityTopics(MATERIALITY_TOPICS);
    setScenarios(SCENARIOS);
    setNotifications(NOTIFICATIONS);
    setIndustries(DEFAULT_INDUSTRIES);
    setCompanyDB(COMPANY_DB_DEFAULTS);
    setModelParamsState({ ...MODEL_PARAM_DEFAULTS });
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify({
      opportunities, complianceItems, climateRisks, materialityTopics,
      scenarios, notifications, industries, companyDB, modelParams,
      _exportedAt: new Date().toISOString(),
      _version: 1,
    }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cesgs-dashboard-data-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJson = (jsonStr) => {
    try {
      const parsed = JSON.parse(jsonStr);
      if (parsed.opportunities) setOpportunities(parsed.opportunities);
      if (parsed.complianceItems) setComplianceItems(parsed.complianceItems);
      if (parsed.climateRisks) setClimateRisks(parsed.climateRisks);
      if (parsed.materialityTopics) setMaterialityTopics(parsed.materialityTopics);
      if (parsed.scenarios) setScenarios(parsed.scenarios);
      if (parsed.notifications) setNotifications(parsed.notifications);
      if (parsed.industries) setIndustries(parsed.industries);
      if (parsed.companyDB) setCompanyDB(parsed.companyDB);
      if (parsed.modelParams) setModelParamsState(parsed.modelParams);
      return { ok: true };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  };

  return {
    opportunities, complianceItems, climateRisks, materialityTopics,
    scenarios, notifications, industries, companyDB, modelParams,
    esgRatings, registeredUsers,
    opp: makeCRUD(opportunities, setOpportunities, 'OPP-'),
    comp: makeCRUD(complianceItems, setComplianceItems, 'C'),
    risk: makeCRUD(climateRisks, setClimateRisks, 'R'),
    mater: makeCRUD(materialityTopics, setMaterialityTopics, 'M'),
    scen: makeCRUD(scenarios, setScenarios, 's'),
    notif: makeCRUD(notifications, setNotifications, 'n'),
    esg: makeCRUD(esgRatings, setEsgRatingsState, 'co'),
    usr: makeCRUD(registeredUsers, setRegisteredUsersState, 'u'),
    company: makeCRUD(companyDB, setCompanyDB, 'CO'),
    setIndustries, setEsgRatings, setRegisteredUsers, setCompanyDB, setModelParams,
    resetAll, exportJson, importJson,
  };
};

const DataEditModal = ({ open, onClose, onSave, title, fields, initial }) => {
  const [form, setForm] = useState(initial || {});
  const [touched, setTouched] = useState(false);

  useEffect(() => {
    if (open) {
      setForm(initial || {});
      setTouched(false);
    }
  }, [open, initial]);

  if (!open) return null;

  const setField = (key, value) => {
    setTouched(true);
    setForm(f => ({ ...f, [key]: value }));
  };

  const handleSave = () => {
    onSave(form);
    onClose();
  };

  return (
    <div className="cmd-backdrop" onClick={onClose} style={{paddingTop:'6vh', alignItems:'flex-start'}}>
      <div className="cmd-panel" onClick={e => e.stopPropagation()} style={{width:'min(720px, 94vw)', maxHeight:'88vh', display:'flex', flexDirection:'column'}}>
        <div className="cmd-input-row" style={{padding:'18px 22px'}}>
          <Icon name="edit" size={16} />
          <div style={{flex:1, fontFamily:'var(--font-display)', fontWeight:700, fontSize:16}}>{title}</div>
          <button onClick={onClose} className="icon-button" style={{width:32, height:32}}><Icon name="x" size={14} /></button>
        </div>
        <div style={{padding:'18px 22px', overflowY:'auto', flex:1}}>
          {fields.map(f => (
            <div key={f.key} className="field" style={{marginBottom:14}}>
              <label className="field-label" style={{display:'block', marginBottom:6, fontSize:11, fontFamily:'var(--font-mono)', letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--text-muted)'}}>
                {f.label} {f.required && <span style={{color:'var(--rose-glow)'}}>*</span>}
              </label>
              {f.type === 'textarea' ? (
                <textarea
                  className="field-input"
                  value={form[f.key] ?? ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder}
                  rows={f.rows || 3}
                  style={{width:'100%', padding:'10px 12px', fontSize:13, fontFamily:'var(--font-body)', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background:'var(--bg-card)', resize:'vertical'}}
                />
              ) : f.type === 'select' ? (
                <select
                  className="field-input"
                  value={form[f.key] ?? ''}
                  onChange={e => setField(f.key, e.target.value)}
                  style={{width:'100%', padding:'10px 12px', fontSize:13, fontFamily:'var(--font-body)', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background:'var(--bg-card)'}}
                >
                  <option value="">— pilih —</option>
                  {f.options.map(o => (
                    <option key={typeof o === 'object' ? o.value : o} value={typeof o === 'object' ? o.value : o}>
                      {typeof o === 'object' ? o.label : o}
                    </option>
                  ))}
                </select>
              ) : f.type === 'multiselect' ? (
                <div style={{display:'flex', flexWrap:'wrap', gap:6, padding:'8px 10px', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background:'var(--bg-card)'}}>
                  {f.options.map(o => {
                    const arr = form[f.key] || [];
                    const checked = arr.includes(o);
                    return (
                      <span
                        key={o}
                        onClick={() => setField(f.key, checked ? arr.filter(x => x !== o) : [...arr, o])}
                        style={{
                          fontSize:11, padding:'4px 10px', borderRadius:6, cursor:'pointer',
                          border: '1px solid ' + (checked ? 'var(--purple-500)' : 'var(--border-soft)'),
                          background: checked ? 'var(--purple-100)' : 'var(--bg-base)',
                          color: checked ? 'var(--purple-700)' : 'var(--text-secondary)',
                          fontWeight: checked ? 600 : 500,
                        }}
                      >{o}</span>
                    );
                  })}
                </div>
              ) : f.type === 'checkbox' ? (
                <label style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', padding:'8px 0'}}>
                  <input
                    type="checkbox"
                    checked={!!form[f.key]}
                    onChange={e => setField(f.key, e.target.checked)}

                  />
                  <span style={{fontSize:13, color:'var(--text-secondary)'}}>{f.checkboxLabel || 'Aktif'}</span>
                </label>
              ) : f.type === 'number' ? (
                <input
                  type="number"
                  className="field-input"
                  value={form[f.key] ?? ''}
                  onChange={e => setField(f.key, e.target.value === '' ? '' : parseFloat(e.target.value))}
                  placeholder={f.placeholder}
                  step={f.step || 'any'}

                  max={f.max}

                    type="text"

                    onChange={e => setField(f.key, e.target.value)}

                    style={{flex:1, padding:'10px 12px', fontSize:13, fontFamily:'var(--font-mono)', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background:'var(--bg-card)'}}
                  />

              ) : (
                <input
                  type="text"
                  className="field-input"
                  value={form[f.key] ?? ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder}
                  readOnly={f.readOnly}
                  style={{width:'100%', padding:'10px 12px', fontSize:13, fontFamily:f.mono?'var(--font-mono)':'var(--font-body)', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background: f.readOnly ? 'var(--bg-base)' : 'var(--bg-card)'}}
                />
              )}
              {f.hint && <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>{f.hint}</div>}
            </div>
          ))}
        </div>
        <div style={{padding:'14px 22px', borderTop:'1px solid var(--border-soft)', display:'flex', gap:10, justifyContent:'flex-end', background:'var(--bg-base)'}}>
          <button className="button outline" onClick={onClose}>
            <span>Batal</span>
          </button>
          <button className="button primary" onClick={handleSave}>
            <Icon name="check" size={12} />
            <span>{initial && initial.id ? 'Simpan Perubahan' : 'Tambahkan'}</span>
          </button>
        </div>
      </div>
    </div>
  );
};

const AdminCompanyDB = ({ dataStore }) => {
  const cols = ['sustainalytics', 'msci', 'bloomberg', 'refinitiv'];
  const toRows = (db) => (db || []).map(c => ({ name: c.name || '', ticker: c.ticker || '', sector: c.sector || '',
    sustainalytics: (c.ratings && c.ratings.sustainalytics) || '', msci: (c.ratings && c.ratings.msci) || '',
    bloomberg: (c.ratings && c.ratings.bloomberg) || '', refinitiv: (c.ratings && c.ratings.refinitiv) || '' }));
  const [rows, setRows] = useState(() => toRows(dataStore.companyDB));
  const [importText, setImportText] = useState('');
  const [msg, setMsg] = useState('');
  const setCell = (i, k, v) => setRows(prev => prev.map((r, idx) => idx === i ? { ...r, [k]: v } : r));
  const addRow = () => setRows(prev => [...prev, { name: '', ticker: '', sector: '', sustainalytics: '', msci: '', bloomberg: '', refinitiv: '' }]);
  const delRow = (i) => setRows(prev => prev.filter((_, idx) => idx !== i));
  const toDb = (rs) => rs.filter(r => (r.name || '').trim()).map(r => ({
    name: r.name.trim(), ticker: (r.ticker || '').trim(), sector: (r.sector || '').trim(),
    ratings: cols.reduce((o, k) => { const v = (r[k] || '').toString().trim(); if (v) o[k] = v; return o; }, {}),
  }));
  const save = () => { const db = toDb(rows); dataStore.setCompanyDB(db); setMsg('✓ Tersimpan & dipush ke dashboard user — ' + db.length + ' perusahaan.'); };
  const importCsv = () => {
    const text = importText.trim();
    if (!text) { setMsg('Tempel data CSV dulu.'); return; }
    const lines = text.split(/\r?\n/).filter(Boolean);
    let parsed = lines.map(l => { const c = l.split(','); return { name: (c[0] || '').trim(), ticker: (c[1] || '').trim(), sector: (c[2] || '').trim(), sustainalytics: (c[3] || '').trim(), msci: (c[4] || '').trim(), bloomberg: (c[5] || '').trim(), refinitiv: (c[6] || '').trim() }; });
    if (parsed[0] && /nama|name/i.test(parsed[0].name)) parsed = parsed.slice(1);
    setRows(parsed); setMsg('CSV ter-parse: ' + parsed.length + ' baris. Klik "Simpan & Push" untuk menerapkan.');
  };
  const resetDefault = () => { setRows(toRows(COMPANY_DB_DEFAULTS)); setMsg('Dikembalikan ke contoh default (belum disimpan).'); };

  const COLS_ORDER = ['nama', 'ticker', 'sektor', 'sustainalytics', 'msci', 'bloomberg', 'refinitiv'];
  const objToRow = (o) => {
    const get = (...keys) => { for (const k of Object.keys(o)) { if (keys.includes(k.toString().trim().toLowerCase())) return o[k]; } return ''; };
    return {
      name: String(get('nama', 'name', 'perusahaan') || '').trim(),
      ticker: String(get('ticker', 'kode', 'kode saham') || '').trim(),
      sector: String(get('sektor', 'sector', 'industri') || '').trim(),
      sustainalytics: String(get('sustainalytics') || '').trim(),
      msci: String(get('msci') || '').trim(),
      bloomberg: String(get('bloomberg') || '').trim(),
      refinitiv: String(get('refinitiv', 'refinitive') || '').trim(),
    };
  };
  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    const isCsv = /\.csv$/i.test(file.name);
    reader.onload = (ev) => {
      try {
        if (isCsv || !window.XLSX) {
          // CSV path (atau fallback bila SheetJS belum termuat)
          if (/\.xlsx?$/i.test(file.name) && !window.XLSX) { setMsg('Library Excel belum termuat (perlu internet). Pakai CSV, atau coba lagi.'); return; }
          const text = ev.target.result;
          const lines = String(text).trim().split(/\r?\n/).filter(Boolean);
          let arr = lines.map(l => { const c = l.split(','); const o = {}; COLS_ORDER.forEach((k, i) => o[k] = (c[i] || '').trim()); return o; });
          if (arr[0] && /nama|name/i.test(arr[0].nama)) arr = arr.slice(1);
          setRows(arr.map(objToRow).filter(r => r.name));
        } else {
          const wb = window.XLSX.read(ev.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
          setRows(json.map(objToRow).filter(r => r.name));
        }
        setMsg('✓ File "' + file.name + '" terbaca. Periksa tabel lalu klik "Simpan & Push".');
      } catch (err) { setMsg('Gagal membaca file: ' + err.message); }
      e.target.value = '';
    };
    if (isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
  };
  const TEMPLATE_HEADERS = ['nama', 'ticker', 'sektor', 'sustainalytics', 'msci', 'bloomberg', 'refinitiv'];
  const TEMPLATE_SAMPLE = ['PT Contoh Industri Tbk', 'CONT', 'Manufacturing', '22.5 (Medium Risk)', 'BBB', '55', 'B+'];
  const downloadCsvTemplate = () => {
    const csv = TEMPLATE_HEADERS.join(',') + '\n' + TEMPLATE_SAMPLE.join(',') + '\n';
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'template-database-perusahaan.csv'; a.click(); URL.revokeObjectURL(a.href);
  };
  const downloadXlsxTemplate = () => {
    if (!window.XLSX) { setMsg('Library Excel belum termuat (perlu internet) — gunakan template CSV.'); return; }
    const ws = window.XLSX.utils.aoa_to_sheet([TEMPLATE_HEADERS, TEMPLATE_SAMPLE]);
    const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, 'Perusahaan');
    window.XLSX.writeFile(wb, 'template-database-perusahaan.xlsx');
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">// Superadmin · Master Data · Rating</div>
        <h1 className="page-title">Database Perusahaan & Rating</h1>

      </div>

      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-header">
          <div><div className="card-title">Tabel Perusahaan ({rows.length})</div><div className="card-sub">Edit langsung di sel. Kosongkan kolom rating bila lembaga itu tidak merating.</div></div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <button className="button outline" onClick={addRow}><Icon name="plus" size={12} /><span>Tambah Baris</span></button>
            <button className="button primary" onClick={save}><Icon name="check" size={12} /><span>Simpan & Push</span></button>
          </div>
        </div>
        {msg && <div style={{ margin: '10px 0', padding: '8px 12px', background: 'var(--purple-50)', border: '1px solid var(--purple-200)', borderRadius: 8, fontSize: 12, color: 'var(--purple-700)' }}>{msg}</div>}
        <div style={{ overflowX: 'auto', marginTop: 10 }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 880, fontSize: 12 }}>
            <thead><tr style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase' }}>
              <th style={{ textAlign: 'left', padding: '6px 8px' }}>Nama Perusahaan</th>

              <th style={{ textAlign: 'left', padding: '6px 8px' }}>MSCI</th>
              <th style={{ textAlign: 'left', padding: '6px 8px' }}>Bloomberg</th>
              <th style={{ textAlign: 'left', padding: '6px 8px' }}>Refinitiv</th>
              <th></th>
            </tr></thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} style={{ borderTop: '1px solid var(--border-soft)' }}>
                  {['name', 'ticker', 'sector', 'sustainalytics', 'msci', 'bloomberg', 'refinitiv'].map(k => (

        </div>
        <div style={{ marginTop: 12, display: 'flex', gap: 8, flexWrap: 'wrap' }}>

const AdminModelParams = ({ dataStore }) => {
  const [p, setP] = useState(() => ({ ...dataStore.modelParams }));
  const [msg, setMsg] = useState('');
  const set = (k, v) => setP(prev => ({ ...prev, [k]: v }));
  const apply = () => {
    const np = {}; Object.keys(MODEL_PARAM_DEFAULTS).forEach(k => { np[k] = +p[k]; });
    dataStore.setModelParams(np);
    setMsg('✓ Semua parameter diterapkan ke dashboard user — emisi, finansial (NPV/IRR), harga karbon, & ambang level transisi mengikuti nilai baru.');
  };
  const resetDefault = () => { setP({ ...MODEL_PARAM_DEFAULTS }); setMsg('Dikembalikan ke nilai default (belum diterapkan).'); };

  // Preview dampak pada contoh biaya: listrik Rp 20.000 jt, BBM Rp 8.000 jt, belanja Rp 180.000 jt
  const mwh = 20000 * 1000 / (+p.elecTariff || 1450);
  const liter = 8000 * 1e6 / (+p.fuelPrice || 13000);
  const s2 = mwh * (+p.gridEF || 0.79);
  const s1 = liter * (+p.fuelEF || 2.68) / 1000;
  const s3 = 180000 * (+p.scope3Factor || 0.31);
  const fmt = (n) => Math.round(n).toLocaleString('id-ID');

  const Field = ({ k, label, unit, help }) => (
    <div className="field">
      <label className="field-label">{label}{unit ? <span style={{ color: 'var(--text-muted)', fontWeight: 400 }}> · {unit}</span> : ''}</label>
      <input type="number" step="any" className="field-input" value={p[k] ?? ''} onChange={e => set(k, e.target.value)} />
      {help && <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginTop: 4 }}>{help}</div>}
    </div>
  );

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">// Superadmin · Engine · Parameter Perhitungan</div>
        <h1 className="page-title">Parameter Model & Formula</h1>
        <p className="page-sub">Ubah koefisien yang dipakai SEMUA mesin perhitungan dashboard: emisi, finansial (NPV/IRR/payback), harga karbon, & ambang level transisi. Perubahan <strong>langsung diterapkan ke dashboard user</strong> setelah disimpan.</p>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 16, justifyContent: 'flex-end' }}>
        <button className="button ghost" onClick={resetDefault} style={{ fontSize: 11 }}>Reset semua ke default</button>
        <button className="button primary" onClick={apply}><Icon name="check" size={12} /><span>Terapkan Semua ke Dashboard</span></button>
      </div>
      {msg && <div style={{ margin: '0 0 16px', padding: '10px 12px', background: 'var(--purple-50)', border: '1px solid var(--purple-200)', borderRadius: 8, fontSize: 12, color: 'var(--purple-700)' }}>{msg}</div>}

      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-header"><div><div className="card-title">1 · Faktor Konversi & Emisi</div><div className="card-sub">Formula: emisi = (biaya ÷ harga) × faktor emisi → GHG Dashboard, baseline, Opportunities</div></div></div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginTop: 12 }}>
          <Field k="elecTariff" label="Tarif Listrik" unit="Rp/kWh" help="Ubah biaya listrik → kWh/MWh" />
          <Field k="fuelPrice" label="Harga BBM" unit="Rp/liter" help="Ubah biaya BBM → liter" />
          <Field k="gridEF" label="Faktor Emisi Listrik (grid)" unit="tCO₂e/MWh" help="Default PLN ≈ 0,79" />
          <Field k="fuelEF" label="Faktor Emisi BBM" unit="kgCO₂/liter" help="Default diesel ≈ 2,68" />
          <Field k="scope3Factor" label="Faktor Scope 3 (spend-based)" unit="tCO₂e/Rp juta" help="EEIO default ≈ 0,31" />
        </div>
      </div>

      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-header"><div><div className="card-title">2 · Asumsi Finansial (Feasibility)</div><div className="card-sub">Default untuk NPV/IRR/payback di kalkulator kelayakan</div></div></div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginTop: 12 }}>
          <Field k="wacc" label="WACC / Discount Rate" unit="%" help="Tingkat diskonto NPV" />
          <Field k="horizon" label="Horizon Analisis" unit="tahun" help="Periode proyeksi arus kas" />
          <Field k="taxRate" label="Tarif Pajak" unit="%" help="Untuk arus kas setelah pajak" />
          <Field k="energyEsc" label="Eskalasi Harga Energi" unit="%/thn" help="Kenaikan harga energi tahunan" />
        </div>
      </div>

      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-header"><div><div className="card-title">3 · Karbon & Ambang Level Transisi</div><div className="card-sub">Konversi harga karbon skenario & logika pengelompokan Low/Moderate/High</div></div></div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginTop: 12 }}>
          <Field k="usdIdr" label="Kurs USD → IDR (harga karbon)" unit="Rp/USD" help="Skenario iklim memakai USD/tCO₂e" />
          <Field k="lowPaybackMax" label="Payback Maks. Level Low" unit="tahun" help="Peluang prioritas tinggi dgn payback ≤ nilai ini masuk Low" />
        </div>
      </div>

      <div className="card">
        <div className="card-header"><div><div className="card-title">Pratinjau Dampak (Emisi)</div><div className="card-sub">Contoh: listrik Rp 20.000 jt · BBM Rp 8.000 jt · belanja Rp 180.000 jt</div></div></div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px,1fr))', gap: 12, marginTop: 12 }}>
          {[
            { l: 'Scope 1 (BBM)', v: fmt(s1) + ' tCO₂e' },
            { l: 'Scope 2 (Listrik)', v: fmt(s2) + ' tCO₂e' },
            { l: 'Baseline (S1+2)', v: fmt(s1 + s2) + ' tCO₂e', hl: true },
            { l: 'Scope 3 (estimasi)', v: fmt(s3) + ' tCO₂e' },
          ].map((k, i) => (
            <div key={i} className="card" style={{ padding: 14 }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>{k.l}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 18, color: k.hl ? 'var(--purple-700)' : 'var(--text-primary)', marginTop: 4 }}>{k.v}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 14, lineHeight: 1.6 }}>
          Catatan: yang dapat diubah di sini adalah <strong>koefisien/parameter</strong> formula (faktor & harga), bukan struktur rumusnya. Ini sudah mencakup pembaruan model emisi inti.
          Untuk parameter lain (bobot skor peluang, ambang level transisi, asumsi finansial NPV/WACC) bisa ditambahkan ke panel ini berikutnya.
        </div>
      </div>
    </div>
  );
};

        <Fold title="Khusus Superadmin" sub="Database perusahaan & parameter model" icon="shield" open={open === 5} onToggle={() => toggle(5)}>
          <ul style={{ paddingLeft: 18, marginTop: 8 }}>
            <Tip><strong>Database Perusahaan & Rating</strong> — kelola daftar perusahaan; bisa upload Excel/CSV (unduh template dulu agar kolom sama).</Tip>
            <Tip><strong>Parameter Model & Formula</strong> — ubah koefisien semua rumus (emisi, finansial NPV/IRR, harga karbon, ambang level). Perubahan langsung diterapkan ke dashboard user.</Tip>
          </ul>
        </Fold>
      )}

      <div className="card" style={{ marginTop: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
        <div style={{ fontSize: 12.5, color: 'var(--text-muted)' }}>Panduan ini bisa dibuka lagi kapan saja lewat menu <strong>Beranda › Panduan & Tutorial</strong>.</div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="button ghost" onClick={() => go(isAdmin ? 'admin-overview' : 'overview')}>Lewati</button>
          <button className="button primary" onClick={() => go(isAdmin ? 'admin-overview' : 'profile-identitas')}><Icon name="check" size={12} /><span>Mulai pakai dashboard</span></button>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [user, setUser] = useState(null);
  const [activeView, setActiveView] = useState('overview');
  const [profile, setProfile] = useState(() => recomputeDerived({ ...DEFAULT_PROFILE, temporal: JSON.parse(JSON.stringify(DEFAULT_PROFILE.temporal)) }));
  const [toast, setToast] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);
  // Shared across the recommendation flow:
  const [selectedOpp, setSelectedOpp] = useState(null);     // Opportunities → Feasibility (peluang yang dipilih)
  const [carbonPrice, setCarbonPrice] = useState(0);        // Scenario → harga karbon (hanya untuk visualisasi skenario)

  // Editable data store with localStorage persistence
  const dataStore = useDataStore();

  // Muat database dari cloud (Google Sheets via Apps Script) saat dashboard dibuka
  useEffect(() => {
    if (!BACKEND_URL) return;
    backendGet('all').then(d => {
      if (d && Array.isArray(d.companies) && d.companies.length) {
        dataStore.setCompanyDB(d.companies.map(mapSheetCompany).filter(c => c.name));
      }
      if (d && d.params && Object.keys(d.params).length) {
        dataStore.setModelParams(prev => ({ ...prev, ...d.params }));
      }
    }).catch(e => console.warn('Muat database cloud gagal, pakai data lokal:', e));
  }, []);

  // Setter Profil terkontrol — semua input live-saved & memicu hitung-ulang turunan
  const updateProfile = (mutator) => setProfile(prev => recomputeDerived(mutator(prev || DEFAULT_PROFILE)));
  const setField = (k, v) => updateProfile(p => ({ ...p, [k]: v }));
  const setTemporalField = (metric, year, v) => updateProfile(p => ({ ...p, temporal: { ...p.temporal, [metric]: { ...((p.temporal || {})[metric] || {}), [year]: v === '' ? '' : Number(v) } } }));
  const toggleMultiField = (k, opt) => updateProfile(p => { const arr = Array.isArray(p[k]) ? p[k] : []; return { ...p, [k]: arr.includes(opt) ? arr.filter(x => x !== opt) : [...arr, opt] }; });

  // Skenario iklim TIDAK lagi mengubah angka Opportunities/Feasibility (angka tetap).
  // carbonPrice hanya dipakai untuk visualisasi di halaman Scenario.
  const pickOpp = (id) => { setSelectedOpp(id); setActiveView('feasibility'); };

  // Bila superadmin mengubah parameter model, hitung-ulang baseline profil agar dashboard ikut ter-update
  useEffect(() => { setProfile(prev => prev ? recomputeDerived(prev) : prev); }, [dataStore.modelParams]);

  // Global keyboard shortcut: Cmd+K / Ctrl+K → open command palette
  useEffect(() => {
    if (!user) return;
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdOpen(v => !v);
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [user]);

  // Filter opportunities by user profile industry (from editable store)
  const filteredOpportunities = useMemo(() => {
    const base = (dataStore.opportunities && dataStore.opportunities.length) ? dataStore.opportunities : ALL_OPPORTUNITIES;
    if (!profile) return base.slice(0, 8);
    const f = base.filter(o => (o.industries || []).includes(profile.industry));
    return f.length ? f : base;   // fallback: jangan pernah kosong walau sektor tak cocok
  }, [profile, dataStore.opportunities]);

  // Peluang hasil generate AI (digabung ke daftar utama)
  const [aiOpps, setAiOpps] = useState([]);
  const mergedOpportunities = useMemo(() => [...filteredOpportunities, ...aiOpps], [filteredOpportunities, aiOpps]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 3000);
  };

  const handleLogin = (account) => {
    setUser(account);
    // Profil terisi default agar dashboard langsung berfungsi (bukan null)
    setProfile(recomputeDerived({ ...DEFAULT_PROFILE, temporal: JSON.parse(JSON.stringify(DEFAULT_PROFILE.temporal)) }));
    if (account.role === 'superadmin') { setActiveView('admin-overview'); return; }
    let seen = false; try { seen = window.localStorage.getItem('cesgs_seen_tutorial') === '1'; } catch (e) {}
    setActiveView(seen ? 'overview' : 'tutorial');   // first login → panduan
  };

  const handleLogout = () => {
    setUser(null);
    setProfile(null);
    setActiveView('overview');
  };

  if (!user) return <LoginScreen onLogin={handleLogin} />;

  const renderView = () => {
    if (user.role === 'superadmin') {
      switch (activeView) {
        case 'admin-overview': return <AdminOverview />;
        case 'admin-users': return <AdminUsers dataStore={dataStore} />;
        case 'admin-companies': return <AdminCompanies dataStore={dataStore} />;
        case 'admin-company-db': return <AdminCompanyDB dataStore={dataStore} />;
        case 'admin-model-params': return <AdminModelParams dataStore={dataStore} />;
        case 'admin-esg-ratings': return <AdminEsgRatings dataStore={dataStore} />;
        case 'admin-opportunities': return <AdminOppDB dataStore={dataStore} setActiveView={setActiveView} />;
        case 'admin-data': return <AdminDataEditor dataStore={dataStore} />;
        case 'admin-market': return <AdminMarket />;
        case 'admin-standards': return <AdminStandards />;
        case 'admin-analytics': return <AdminAnalytics />;
        default: return <AdminOverview />;
      }
    }
    switch (activeView) {
      case 'tutorial': return <TutorialPage user={user} setActiveView={setActiveView} />;
      case 'overview': return <UserOverview profile={profile} opportunities={filteredOpportunities} setActiveView={setActiveView} />;
      case 'exec-summary': return <ExecutiveSummary profile={profile} opportunities={filteredOpportunities} setActiveView={setActiveView} />;
      case 'profile': return <CompanyProfile profile={profile} setField={setField} setTemporalField={setTemporalField} toggleMultiField={toggleMultiField} showToast={showToast} industries={dataStore.industries} stepId="identitas" setActiveView={setActiveView} />;
      case 'profile-identitas': case 'profile-finansial': case 'profile-energi': case 'profile-operasional': case 'profile-kebijakan': case 'profile-program': case 'profile-kapasitas':
        return <CompanyProfile profile={profile} setField={setField} setTemporalField={setTemporalField} toggleMultiField={toggleMultiField} showToast={showToast} industries={dataStore.industries} stepId={activeView.replace('profile-', '')} setActiveView={setActiveView} />;
      case 'opportunities': return <Opportunities profile={profile} opportunities={mergedOpportunities} allOpportunities={dataStore.opportunities} setActiveView={setActiveView} dataStore={dataStore} carbonPrice={0} onPickOpp={pickOpp} aiOpps={aiOpps} setAiOpps={setAiOpps} showToast={showToast} scenarios={dataStore.scenarios} scenCrud={dataStore.scen} scenarioCarbonPrice={carbonPrice} setScenarioCarbonPrice={setCarbonPrice} />;
      case 'rating-check': return <RatingGate profile={profile} toggleMultiField={toggleMultiField} setActiveView={setActiveView} />;
      case 'esg-rating': return ratingUnlocked(profile) ? <EsgRating profile={profile} esgRatings={dataStore.esgRatings} /> : <RatingLocked profile={profile} setActiveView={setActiveView} title="ESG Rating" />;
      case 'emissions': return <GhgDashboard profile={profile} setActiveView={setActiveView} />;
      case 'risks': return <RiskHeatmap profile={profile} climateRisks={dataStore.climateRisks} materialityTopics={dataStore.materialityTopics} riskCrud={dataStore.risk} materCrud={dataStore.mater} industries={dataStore.industries} />;
      case 'scenarios': return <ScenarioAnalysis profile={profile} scenarios={dataStore.scenarios} scenCrud={dataStore.scen} carbonPrice={carbonPrice} setCarbonPrice={setCarbonPrice} setActiveView={setActiveView} />;
      case 'roadmap': return <RoadmapPlanner profile={profile} opportunities={filteredOpportunities} />;
      case 'peer-benchmark': return ratingUnlocked(profile) ? (
        <div className="page">
          <div className="page-header">
            <div className="page-eyebrow">// Analytics · Benchmarking</div>
            <h1 className="page-title">Peer Benchmark<InfoTip title={FEATURE_INFO["peer-benchmark"].t}>{FEATURE_INFO["peer-benchmark"].d}</InfoTip></h1>
            <p className="page-sub">
              Posisi {profile ? <strong>{profile.companyName}</strong> : 'perusahaan Anda'} dibandingkan dengan median sektor dan top quartile emiten IDX
              pada 6 dimensi kunci climate readiness.
            </p>
          </div>
          <PeerBenchmark profile={profile} />
        </div>
      ) : <RatingLocked profile={profile} setActiveView={setActiveView} title="Peer Benchmark" />;
      case 'feasibility': return <Feasibility opportunities={mergedOpportunities} profile={profile} initialOppId={selectedOpp} carbonPrice={0} setActiveView={setActiveView} />;
      default: return <UserOverview profile={profile} opportunities={filteredOpportunities} setActiveView={setActiveView} />;
    }
  };

  return (
    <div className="app-shell-v2">
      <TopNav
        user={user}
        activeView={activeView}
        setActiveView={setActiveView}
        onLogout={handleLogout}
        onOpenSearch={() => setCmdOpen(true)}
        notifications={dataStore.notifications}
        updateNotif={dataStore.notif.update}
        mobileOpen={mobileOpen}
        setMobileOpen={setMobileOpen}
      />
      <main className="main-area-v2">
        {renderView()}
      </main>
      {toast && (
        <div className="toast">
          <Icon name="check" size={14} />
          <span>{toast}</span>
        </div>
      )}
      {user.role !== 'superadmin' && <AiCopilot activeView={activeView} profile={profile} />}
      <CommandPalette
        open={cmdOpen}
        onClose={() => setCmdOpen(false)}
        onNavigate={(view) => { setActiveView(view); setCmdOpen(false); }}
        userRole={user.role}
        opportunities={dataStore.opportunities}
      />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
