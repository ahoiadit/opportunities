const MODULE_BY_OPP = { 'OPP-001': 'pv', 'OPP-002': 'led_hvac', 'OPP-005': 'ev_fleet' };
const moduleFor = (opp) => TECH_MODULES[(opp && MODULE_BY_OPP[opp.id]) || 'generic'];
const defaultsFor = (mod, opp) => {
  const d = {};
  mod.fields.forEach(f => { d[f.key] = typeof f.default === 'function' ? f.default(opp) : f.default; });
  return d;
};
const isMoneyField = (f) => f.unit && f.unit.indexOf('Rp juta') === 0;
const moneyDisplay = (f, v) => {
  const suffix = f.unit.indexOf('/') >= 0 ? f.unit.slice(f.unit.indexOf('/')) : '';
  return formatRupiah(Number(v) || 0) + suffix;
};
const signed = (v) => (v < 0 ? '−' : '+') + formatRupiah(Math.abs(v));

const Feasibility = ({ opportunities, profile, initialOppId, carbonPrice = 0, setActiveView, fromSelection, setTab }) => {
  const noSelection = fromSelection && (!opportunities || opportunities.length === 0);
  const opps = (opportunities && opportunities.length) ? opportunities : ALL_OPPORTUNITIES;
  const [selected, setSelected] = useState((initialOppId && opps.some(o => o.id === initialOppId)) ? initialOppId : opps[0]?.id);
  useEffect(() => { if (initialOppId && opps.some(o => o.id === initialOppId)) setSelected(initialOppId); }, [initialOppId]);
  useEffect(() => { if (opps.length && !opps.some(o => o.id === selected)) setSelected(opps[0].id); }, [opportunities]);
  const opp = opps.find(o => o.id === selected) || opps[0];
  const mod = moduleFor(opp);
  const cp = Number(carbonPrice) || 0;

  const [fin, setFin] = useState({ ...FIN_DEFAULTS });
  const [showMethod, setShowMethod] = useState(false);
  const [paramsByOpp, setParamsByOpp] = useState({});
  const params = paramsByOpp[selected] || defaultsFor(mod, opp);
  const setParam = (k, v) => setParamsByOpp(prev => ({
    ...prev,
    [selected]: { ...(prev[selected] || defaultsFor(mod, opp)), [k]: v },
  }));
  const resetParams = () => setParamsByOpp(prev => ({ ...prev, [selected]: defaultsFor(mod, opp) }));

  // Nilai karbon terhindar (Rp juta/thn) ditambahkan ke manfaat operasi → memengaruhi NPV/IRR
  const result = useMemo(() => {
    const c = mod.compute(params, fin, opp);
    const carbonVal = cp > 0 ? (c.emissionsCut || 0) * cp / 1e6 : 0;
    c.annualBenefit = (c.annualBenefit || 0) + carbonVal;
    const r = buildResult(c, fin);
    r.carbonVal = carbonVal;
    return r;
  }, [params, fin, selected, cp]);

  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const ctx = chartRef.current.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 280);
    gradient.addColorStop(0, 'rgba(59, 118, 192, 0.4)');
    gradient.addColorStop(1, 'rgba(59, 118, 192, 0)');
    chartInstance.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: result.cum.map(c => `T+${c.year}`),
        datasets: [{
          label: 'Cumulative Net Cashflow (Rp jt)',
          data: result.cum.map(c => c.cumulative),
          borderColor: '#3B76C0', backgroundColor: gradient, fill: true, tension: 0.25, borderWidth: 2.5,
          pointBackgroundColor: (ctx) => (ctx.parsed.y >= 0 ? '#22C55E' : '#4485C9'),
          pointBorderColor: '#fff', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => 'Rp ' + ctx.parsed.y.toLocaleString('id-ID') + ' jt' } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#5A7A9E', font: { family: 'Aptos', size: 10 } } },
          y: { grid: { color: '#C9DCF0', borderDash: [4, 4] }, ticks: { color: '#5A7A9E', font: { family: 'Aptos', size: 10 }, callback: (v) => 'Rp ' + (v / 1000).toFixed(1) + 'M' } }
        }
      }
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [result]);

  const feasible = result.npv >= 0;

  const renderField = (f) => {
    const v = params[f.key];
    const disp = isMoneyField(f) ? moneyDisplay(f, v) : `${v} ${f.unit || ''}`;
    return (
      <div className="field" key={f.key}>
        <label className="field-label">{f.label}</label>
        {f.type === 'slider' ? (
          <input type="range" min={f.min} max={f.max} step={f.step || 1} value={v}
            onChange={(e) => setParam(f.key, Number(e.target.value))}
            style={{ width: '100%', accentColor: 'var(--purple-600)' }} />
        ) : (
          <input type="number" className="field-input" step={f.step || 'any'} value={v}
            onChange={(e) => setParam(f.key, e.target.value === '' ? 0 : Number(e.target.value))} />
        )}
        <div className="range-display">{disp}</div>
      </div>
    );
  };
  const groupHeader = (txt) => (
    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--purple-700)', margin: '18px 0 10px', paddingBottom: 6, borderBottom: '1px solid var(--border-soft)' }}>{txt}</div>
  );
  const chunk2 = (arr) => { const r = []; for (let i = 0; i < arr.length; i += 2) r.push(arr.slice(i, i + 2)); return r; };

  if (noSelection) {
    return (
      <div className="page">
        <div className="page-header">
          <div className="page-eyebrow">// Feasibility · Belum ada peluang dipilih</div>
          <h1 className="page-title">Feasibility Calculator</h1>
        </div>
        <div className="card" style={{ textAlign: 'center', padding: '40px 24px' }}>
          <div style={{ width: 52, height: 52, borderRadius: 14, background: 'var(--gray-100)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px' }}><Icon name="calculator" size={24} /></div>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 18, marginBottom: 8 }}>Belum ada peluang yang diambil</div>
          <div style={{ fontSize: 13, color: 'var(--text-body)', maxWidth: 480, margin: '0 auto', lineHeight: 1.6 }}>
            Buka tab <strong>Rekomendasi (3 Level)</strong>, lalu <strong>centang</strong> peluang yang ingin Anda ambil. Hanya peluang terpilih yang muncul di sini untuk dihitung kelayakannya.
          </div>
          <div style={{ marginTop: 18 }}>
            <button className="button primary" onClick={() => setTab && setTab('rekomendasi')}><Icon name="arrowRight" size={12} style={{ transform: 'scaleX(-1)' }} /><span>Pilih Peluang Dulu</span></button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">// Langkah 03 · Analisis & Modelling · Feasibility Logic</div>
        <h1 className="page-title">Feasibility Calculator<InfoTip title={FEATURE_INFO["feasibility"].t}>{FEATURE_INFO["feasibility"].d}</InfoTip></h1>
        <p className="page-sub">
          Model kelayakan <strong>spesifik per teknologi</strong>: manfaat &amp; emisi diturunkan dari parameter fisik,
          dengan cashflow <strong>after-tax</strong> dan perlakuan eksplisit atas <strong>aset lama</strong> (nilai sisa · disposal · write-off · biaya terhindar).
        </p>
      </div>

      {/* Banner peran: hubungan dengan Opportunities */}
      <div className="card" style={{marginBottom: 16, background:'var(--purple-50)', borderColor:'var(--purple-200)', display:'flex', gap:12, alignItems:'flex-start'}}>
        <div style={{flexShrink:0, width:34, height:34, background:'var(--gradient-accent)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff'}}>
          <Icon name="info" size={16} />
        </div>
        <div style={{fontSize:13, color:'var(--text-body)', lineHeight:1.55, flex:1}}>
          Kalkulator ini menghitung kelayakan <strong>satu peluang</strong>. Angka penghematan & reduksi emisi di kartu
          <strong> Opportunities</strong> berasal dari mesin yang sama — di sini Anda bisa menyetel asumsinya lebih detail.
        </div>
        {setActiveView && <button className="button outline" style={{flexShrink:0}} onClick={() => setActiveView('opportunities')}><Icon name="arrowRight" size={12} style={{transform:'scaleX(-1)'}} /><span>Opportunities</span></button>}
      </div>

      {/* ── Metode Perhitungan (explainer) ── */}
      <div className="card" style={{marginBottom: 16, borderColor: 'var(--purple-200)'}}>
        <div className="card-header" style={{cursor:'pointer'}} onClick={() => setShowMethod(v => !v)}>
          <div style={{display:'flex', gap:12, alignItems:'center'}}>
            <div style={{flexShrink:0, width:34, height:34, background:'var(--gradient-accent)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff'}}>
              <Icon name="calculator" size={16} />
            </div>
            <div>
              <div className="card-title">Metode Perhitungan Feasibility</div>
              <div className="card-sub">NPV · IRR · Payback — cashflow after-tax inkremental (with vs without)</div>
            </div>
          </div>
          <button className="button ghost" style={{fontSize:11, padding:'6px 12px'}}>
            <span>{showMethod ? '▲ Sembunyikan' : '▼ Lihat Metode'}</span>
          </button>
        </div>

        {showMethod && (
          <div style={{marginTop: 14}}>
            <p style={{fontSize:13, color:'var(--text-body)', lineHeight:1.6, margin:'0 0 14px'}}>
              Setiap peluang dimodelkan sebagai <strong>arus kas inkremental</strong> — selisih kondisi <em>dengan</em> vs <em>tanpa</em>
              proyek. Manfaat operasi (penghematan energi/biaya) dihitung <strong>setelah pajak</strong>, lalu ditambah <em>tax shield</em>
              dari depresiasi aset baru dan <em>write-off</em> aset lama. Semua komponen didiskonto ke nilai kini (PV) memakai WACC.
            </p>

            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(230px, 1fr))', gap:12, marginBottom:14}}>
              <div style={{padding:14, background:'var(--purple-50)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
                <div style={{fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.12em', color:'var(--purple-700)', marginBottom:8}}>① NET PRESENT VALUE</div>
                <div style={{fontFamily:'var(--font-mono)', fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:6}}>
                  NPV = Σ CFₜ ÷ (1+r)ᵗ
                </div>
                <div style={{fontSize:11.5, color:'var(--text-muted)', lineHeight:1.5}}>
                  CFₜ = arus kas bersih tahun-t (after-tax); r = WACC; t = 0…horizon. NPV ≥ 0 → proyek menambah nilai.
                </div>
              </div>
              <div style={{padding:14, background:'var(--purple-50)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
                <div style={{fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.12em', color:'var(--purple-700)', marginBottom:8}}>② INTERNAL RATE OF RETURN</div>
                <div style={{fontFamily:'var(--font-mono)', fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:6}}>
                  IRR : Σ CFₜ ÷ (1+IRR)ᵗ = 0
                </div>
                <div style={{fontSize:11.5, color:'var(--text-muted)', lineHeight:1.5}}>
                  Tingkat diskonto yang membuat NPV = 0 (dicari numerik / bisection). Layak bila IRR &gt; WACC.
                </div>
              </div>
              <div style={{padding:14, background:'var(--purple-50)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
                <div style={{fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.12em', color:'var(--purple-700)', marginBottom:8}}>③ PAYBACK PERIOD</div>
                <div style={{fontFamily:'var(--font-mono)', fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:6}}>
                  Σ CFₜ ≥ 0  (kumulatif)
                </div>
                <div style={{fontSize:11.5, color:'var(--text-muted)', lineHeight:1.5}}>
                  Tahun saat kas kumulatif balik modal. <em>Discounted payback</em> memakai arus kas yang sudah didiskonto.
                </div>
              </div>
            </div>

            <div style={{fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.12em', color:'var(--purple-700)', margin:'4px 0 8px'}}>KOMPONEN ARUS KAS (yang dijumlahkan ke NPV)</div>
            <div style={{display:'flex', flexDirection:'column', gap:7, fontSize:12.5, color:'var(--text-body)'}}>
              <div>• <strong>Tahun 0:</strong> −CAPEX baru + nilai sisa aset lama − biaya bongkar/disposal.</div>
              <div>• <strong>Tiap tahun:</strong> manfaat operasi × (1 − tarif pajak), dieskalasi dgn harga energi; + tax shield depresiasi (CAPEX ÷ masa depresiasi × pajak).</div>
              <div>• <strong>Tahun 1:</strong> tax shield <em>write-off</em> nilai buku aset lama (nilai buku × pajak).</div>
              <div>• <strong>Insidental:</strong> biaya terhindar (counterfactual), penggantian antara (inverter/baterai), nilai residu di akhir horizon.</div>
              <div>• <strong>Emisi:</strong> diturunkan dari basis energi yang sama (mis. kWh dihemat × faktor emisi grid) → tCO₂e/tahun.</div>
            </div>

            <div style={{marginTop:14, padding:'10px 14px', background:'var(--gray-100)', borderRadius:8, fontSize:11.5, color:'var(--text-muted)', lineHeight:1.5}}>
              <strong>Verdict:</strong> proyek dinilai <span style={{color:'#16A34A', fontWeight:700}}>layak</span> bila NPV ≥ 0 (dan umumnya IRR &gt; WACC).
              Ubah WACC, horizon, pajak, atau eskalasi energi di panel <em>Asumsi Finansial</em> untuk uji sensitivitas.
            </div>
          </div>
        )}
      </div>

      <div className="two-col">
        {/* Input Panel */}
        <div className="card elevated">
          <div className="card-header">
            <div>
              <div className="card-title">Input Parameter<InfoTip title={"Input Parameter"}>{"Parameter teknis peluang. Mengubahnya langsung mengubah NPV/IRR & reduksi emisi."}</InfoTip></div>
              <div className="card-sub">Modul: {mod.label}</div>
            </div>
            <button className="button ghost" style={{ fontSize: 11, padding: '6px 12px' }} onClick={resetParams}>
              <span>↺ Reset Default</span>
            </button>
          </div>

          <div className="field">
            <label className="field-label">Pilih Peluang Iklim<InfoTip title={"Pilih Peluang"}>{"Pilih satu peluang untuk dihitung kelayakannya. Parameter & hasil (NPV/IRR) di halaman ini khusus peluang yang dipilih."}</InfoTip></label>
            <select className="field-input" value={selected} onChange={(e) => setSelected(e.target.value)}>
              {opps.map(o => (<option key={o.id} value={o.id}>{o.id} · {o.title}</option>))}
            </select>
          </div>

          {opp && (
            <div style={{ padding: 14, background: 'var(--purple-50)', border: '1px solid var(--border-soft)', borderRadius: 10, marginBottom: 4 }}>
              <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.55 }}>{mod.blurb}</div>
              <div style={{ marginTop: 10, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                <span className="badge info">{opp.category}</span>
                <span className="badge neutral">{opp.ifrsRef}</span>
                <span className="badge neutral">{opp.taxonomy}</span>
              </div>
            </div>
          )}

          {GROUP_ORDER.map(g => {
            const fs = mod.fields.filter(f => f.group === g);
            if (!fs.length) return null;
            return (
              <div key={g}>
                {groupHeader(GROUP_LABELS[g])}
                {chunk2(fs).map((row, i) => (
                  <div className="form-row" key={i}>{row.map(renderField)}</div>
                ))}
              </div>
            );
          })}

          {groupHeader('⑥ Asumsi Finansial')}
          <div className="form-row">
            <div className="field">
              <label className="field-label">Discount Rate / WACC (%)</label>
              <input type="range" min="3" max="20" step="0.5" value={fin.wacc}
                onChange={(e) => setFin({ ...fin, wacc: Number(e.target.value) })}
                style={{ width: '100%', accentColor: 'var(--purple-600)' }} />
              <div className="range-display">{fin.wacc}% per tahun</div>
            </div>
            <div className="field">
              <label className="field-label">Horizon Analisis</label>
              <input type="range" min="3" max="25" value={fin.horizon}
                onChange={(e) => setFin({ ...fin, horizon: Number(e.target.value) })}
                style={{ width: '100%', accentColor: 'var(--purple-600)' }} />
              <div className="range-display">{fin.horizon} tahun</div>
            </div>
          </div>
          <div className="form-row">
            <div className="field">
              <label className="field-label">Tarif Pajak Badan (%)</label>
              <input type="range" min="0" max="35" value={fin.taxRate}
                onChange={(e) => setFin({ ...fin, taxRate: Number(e.target.value) })}
                style={{ width: '100%', accentColor: 'var(--purple-600)' }} />
              <div className="range-display">{fin.taxRate}% (untuk tax shield)</div>
            </div>
            <div className="field">
              <label className="field-label">Eskalasi Harga Energi (%/thn)</label>
              <input type="range" min="0" max="12" step="0.5" value={fin.energyEsc}
                onChange={(e) => setFin({ ...fin, energyEsc: Number(e.target.value) })}
                style={{ width: '100%', accentColor: 'var(--purple-600)' }} />
              <div className="range-display">{fin.energyEsc}% per tahun</div>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
            <button className="button primary">
              <Icon name="download" size={12} /><span>Export Feasibility Report</span>
            </button>
          </div>
        </div>

        {/* Results Panel */}
        <div>
          <div className="card dark" style={{ marginBottom: 16 }}>
            <div className="card-header">
              <div>
                <div className="card-title">Output · Feasibility Logic</div>
                <div className="card-sub">After-tax · incremental (with vs without)</div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.55)', marginBottom: 4 }}>PAYBACK<InfoTip title={"Payback Period"}>{"Lama (tahun) sampai akumulasi penghematan menutup investasi. Discounted payback memakai arus kas yang sudah didiskonto."}</InfoTip></div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 26, color: '#fff', lineHeight: 1.1 }}>
                  {result.payback !== null ? result.payback.toFixed(1) : '—'}
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', marginLeft: 6 }}>yr</span>
                </div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'rgba(255,255,255,0.45)', marginTop: 2 }}>
                  discounted {result.dpayback !== null ? result.dpayback.toFixed(1) + ' yr' : '> horizon'}
                </div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.55)', marginBottom: 4 }}>NPV @{fin.wacc}%<InfoTip title={"Net Present Value"}>{"Nilai kini seluruh arus kas bersih dikurangi investasi (didiskonto dgn WACC). NPV \u2265 0 \u2192 menambah nilai / layak."}</InfoTip></div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 26, color: result.npv >= 0 ? '#86EFAC' : '#FCA5A5', lineHeight: 1.1 }}>
                  {result.npv >= 0 ? '+' : ''}{(result.npv / 1000).toFixed(1)}
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', marginLeft: 6 }}>Rp M</span>
                </div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.55)', marginBottom: 4 }}>IRR<InfoTip title={"Internal Rate of Return"}>{"Tingkat imbal hasil di mana NPV = 0. Layak bila IRR > WACC (atau > hurdle rate Anda)."}</InfoTip></div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 26, color: '#fff', lineHeight: 1.1 }}>
                  {result.irr !== null ? result.irr.toFixed(1) : '—'}
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', marginLeft: 6 }}>%</span>
                </div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.55)', marginBottom: 4 }}>CUT EMISI<InfoTip title={"Reduksi Emisi"}>{"Pengurangan emisi per tahun (tCO\u2082e) dari peluang ini. Dikalikan harga karbon \u2192 nilai karbon terhindar."}</InfoTip></div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 26, color: '#fff', lineHeight: 1.1 }}>
                  {Math.round(result.emissionsCut)}
                  <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', marginLeft: 6 }}>tCO₂e</span>
                </div>
              </div>
            </div>
            <div style={{
              marginTop: 16, padding: 12,
              background: feasible ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)',
              border: `1px solid ${feasible ? 'rgba(134, 239, 172, 0.3)' : 'rgba(252, 165, 165, 0.3)'}`,
              borderRadius: 8, fontSize: 12, color: feasible ? '#86EFAC' : '#FCA5A5',
              fontFamily: 'var(--font-mono)', letterSpacing: '0.05em'
            }}>
              {feasible
                ? `● VERDICT: ECONOMICALLY FEASIBLE — NPV positif${result.irr !== null ? `, IRR ${result.irr.toFixed(1)}% ${result.irr >= fin.wacc ? '> ' : '< '}WACC ${fin.wacc}%` : ''}`
                : '● VERDICT: NOT FEASIBLE — NPV negatif. Tinjau CAPEX, asumsi benefit, atau perpanjang horizon'}
            </div>
          </div>

          <div className="card" style={{ marginBottom: 16 }}>
            <div className="card-header">
              <div>
                <div className="card-title">Detail Komponen (Present Value)<InfoTip title={"Detail Komponen (Present Value)"}>{"Rincian tiap komponen arus kas (didiskonto) yang membentuk NPV peluang ini."}</InfoTip></div>
                <div className="card-sub">Semua komponen didiskonto @{fin.wacc}% → menjumlah ke NPV</div>
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 9, fontFamily: 'var(--font-mono)', fontSize: 12 }}>
              {[
                ['CAPEX investasi baru', result.year0Capex],
                ['Nilai sisa alat lama (jual/rucat)', result.salvageOld],
                ['Biaya bongkar & disposal', -result.disposalOld],
                ['PV manfaat operasi (after-tax)', result.pvOperating],
                ['PV tax shield depresiasi', result.pvDepShield],
                ['PV tax shield write-off alat lama', result.pvWriteoff],
                ['PV biaya terhindar (counterfactual)', result.pvAvoided],
                ['PV penggantian antara', result.pvMidlife],
                ['PV nilai residu akhir', result.pvTerminal],
              ].filter(r => Math.abs(r[1]) >= 0.05).map(([label, val], i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: 'var(--text-muted)' }}>{label}</span>
                  <span style={{ fontWeight: 700, color: val >= 0 ? '#16A34A' : '#DC2626' }}>{signed(val)}</span>
                </div>
              ))}
              <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: 10, borderTop: '1px dashed var(--border-soft)' }}>
                <span style={{ color: 'var(--text-muted)' }}>= NPV @{fin.wacc}%</span>
                <span style={{ fontWeight: 800, color: result.npv >= 0 ? '#16A34A' : '#DC2626' }}>{signed(result.npv)}</span>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <div>
                <div className="card-title">Energi &amp; Emisi<InfoTip title={"Energi & Emisi"}>{"Konsumsi energi & emisi tahunan yang menjadi dasar baseline."}</InfoTip></div>
                <div className="card-sub">Finansial &amp; emisi dari basis energi yang sama</div>
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 9, fontFamily: 'var(--font-mono)', fontSize: 12 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ color: 'var(--text-muted)' }}>Basis energi</span>
                <span style={{ fontWeight: 700, textAlign: 'right', maxWidth: '62%' }}>{result.energyNote}</span>
              </div>
              {result.emissionFactor > 0 && (
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: 'var(--text-muted)' }}>Faktor emisi grid</span>
                  <span style={{ fontWeight: 700 }}>{result.emissionFactor} tCO₂e/MWh</span>
                </div>
              )}
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span style={{ color: 'var(--text-muted)' }}>Reduksi per tahun</span>
                <span style={{ fontWeight: 700, color: '#16A34A' }}>{result.emissionsCut.toFixed(1)} tCO₂e/thn</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: 10, borderTop: '1px dashed var(--border-soft)' }}>
                <span style={{ color: 'var(--text-muted)' }}>Akumulasi {fin.horizon} tahun</span>
                <span style={{ fontWeight: 800, color: 'var(--purple-700)' }}>{Math.round(result.emissionsCut * fin.horizon).toLocaleString('id-ID')} tCO₂e</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Cashflow Chart */}
      <div className="card elevated" style={{ marginTop: 20 }}>
        <div className="card-header">
          <div>
            <div className="card-title">Cumulative Net Cashflow Projection<InfoTip title={"Cumulative Net Cashflow Projection"}>{"Proyeksi kas kumulatif peluang; titik balik ke positif = payback."}</InfoTip></div>
            <div className="card-sub">After-tax incremental · titik hijau = setelah payback</div>
          </div>
        </div>
        <div className="chart-shell">
          <canvas ref={chartRef}></canvas>
        </div>
      </div>
    </div>
  );
};

// =======================================
// USER: COMPLIANCE VIEW
// =======================================
const Compliance = ({ profile, opportunities, complianceItems, updateCompliance, compCrud }) => {
  const items = complianceItems && complianceItems.length ? complianceItems : COMPLIANCE_ITEMS;
  const [activeTab, setActiveTab] = useState('checklist');
  const [modalOpen, setModalOpen] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const canEdit = !!compCrud;

    if (updateCompliance) {
      const cur = items.find(i => i.id === id);
      updateCompliance(id, { done: !cur.done });
    }
  };
  const done = items.filter(i => i.done).length;
  const total = items.length;
  const percent = Math.round((done / total) * 100);

  const COMP_FIELDS = [
    { key: 'id', label: 'ID', type: 'text', readOnly: true, mono: true },
    { key: 'section', label: 'Section', type: 'select', options: ['PSPK 1', 'PSPK 2'], required: true },

  const handleSave = (form) => {
    if (form.id && items.find(i => i.id === form.id)) compCrud.update(form.id, form);
    else compCrud.add(form);
  };
  const handleDelete = (id) => {
    if (window.confirm(`Hapus indikator ${id}?`)) compCrud.remove(id);
  };

  return (

          <div className="kpi-label" style={{color:'rgba(255,255,255,0.7)'}}>

          </div>
          <div className="kpi-value">{percent}<span className="unit">%</span></div>
          <div style={{marginTop: 10}}>
            <div className="progress" style={{background:'rgba(255,255,255,0.15)'}}>
              <div className="progress-fill" style={{width: `${percent}%`}}></div>
            </div>
            <div style={{marginTop: 8, fontFamily:'var(--font-mono)', fontSize: 11, color:'rgba(255,255,255,0.7)'}}>
              {done} dari {total} indikator terpenuhi

        </div>
        <KpiCard label="PSPK 1 STATUS" icon="check" value={`${items.filter(i=>i.section==='PSPK 1'&&i.done).length}/${items.filter(i=>i.section==='PSPK 1').length}`} delta="General requirements" deltaDir="up"/>

      <div className="tabs" style={{marginTop: 24}}>

        >

        </button>
        <button
          className={`tab ${activeTab === 'disclosure' ? 'active' : ''}`}

                  → {section} · {section === 'PSPK 1' ? 'Persyaratan Umum' : 'Pengungkapan Iklim'}
                </div>
                {items.filter(i => i.section === section).map(item => (
                  <div key={item.id} className="checklist-item">

                    <div className="check-ref">{item.ref}</div>
                    {canEdit && (
                      <div style={{display:'flex', gap:4, marginLeft:8}}>
                        <button className="icon-button" style={{width:28, height:28}} onClick={() => openEdit(item)} title="Edit"><Icon name="edit" size={12} /></button>

                    )}

                ))}

      )}

      {activeTab === 'disclosure' && (
        <DisclosureGenerator profile={profile} opportunities={opportunities || []} />

      <DataEditModal

        onClose={() => setModalOpen(false)}

        fields={COMP_FIELDS}
        initial={editingItem}
      />

  );
};

    setModalOpen(true);
  };

    if (!form.name || !form.email) { setFormError('Nama dan email wajib diisi.'); return; }

      createdAt: editing ? (form.createdAt||new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10),

const MSCI_RATINGS = ['AAA','AA','A','BBB','BB','B','CCC'];
const SUSTAINALYTICS_RISKS = ['Negligible','Low','Medium','High','Severe'];
const CDP_RATINGS = ['A','A-','B','B-','C','C-','D','D-','F','N/A'];

const AdminEsgRatings = ({ dataStore }) => {
  const ratings = dataStore.esgRatings;
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [search, setSearch] = useState('');
  const [activeTab, setActiveTab] = useState('table'); // 'table' | 'import'
  const [importText, setImportText] = useState('');
  const [importMsg, setImportMsg] = useState('');

  const filtered = ratings.filter(r =>
    r.companyName.toLowerCase().includes(search.toLowerCase()) ||
    (r.ticker||'').toLowerCase().includes(search.toLowerCase())
  );

  const openAdd = () => { setEditing(null); setForm({ industry: 'Manufacturing' }); setModalOpen(true); };
  const openEdit = (r) => { setEditing(r); setForm({...r}); setModalOpen(true); };
  const handleSave = () => {
    if (!form.companyName) return;
    if (editing) {
      dataStore.esg.update(editing.id, form);
    } else {
      dataStore.esg.add({ id:'co'+Date.now(), ...form, lastUpdated: new Date().toISOString().slice(0,10) });
    }
    setModalOpen(false);
  };

  // Download Excel template
  const downloadTemplate = () => {
    const headers = ['companyName','ticker','industry','msci','msciScore','sustainalytics','sustainalyticsRisk','cdp','refinitiv','bloomberg','notes'];
    const sample = ['PT Contoh Tbk','CNTOH','Manufacturing','BB','4.8','28.4','Medium','B','62','54','Catatan opsional'];
    const csv = [headers.join(','), sample.join(',')].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='esg-ratings-template.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  // Import from CSV text
  const handleImport = () => {
    try {
      const lines = importText.trim().split('\n');
      if (lines.length < 2) { setImportMsg('File kosong atau tidak valid.'); return; }
      const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
      let added = 0;
      for (let i=1; i<lines.length; i++) {
        const vals = lines[i].split(',').map(v=>v.trim().replace(/"/g,''));
        if (!vals[0]) continue;
        const obj = {};
        headers.forEach((h,idx) => { obj[h] = vals[idx] || ''; });
        obj.id = 'co'+Date.now()+i;
        obj.lastUpdated = new Date().toISOString().slice(0,10);
        obj.msciScore = parseFloat(obj.msciScore)||0;
        obj.sustainalytics = parseFloat(obj.sustainalytics)||0;
        obj.refinitiv = parseInt(obj.refinitiv)||0;
        obj.bloomberg = parseInt(obj.bloomberg)||0;
        dataStore.esg.add(obj);
        added++;
      }
      setImportMsg(`✓ ${added} perusahaan berhasil diimpor.`);
      setImportText('');
    } catch(e) {
      setImportMsg('Error parsing: '+e.message);
    }
  };

  const msciColor = (r) => {
    if (!r) return 'var(--text-muted)';
    if (['AAA','AA'].includes(r)) return '#059669';
    if (['A','BBB'].includes(r)) return '#0284C7';
    if (['BB'].includes(r)) return '#D97706';
    if (['B'].includes(r)) return '#DC2626';
    return '#1D52A0';
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">// Administration · ESG Ratings Database</div>
        <h1 className="page-title">ESG Ratings Manager</h1>
        <p className="page-sub">
          Kelola data ESG Rating perusahaan dari berbagai penyedia (MSCI, Sustainalytics, CDP, Refinitiv, Bloomberg).
          Data ini tampil di halaman <strong>ESG Rating</strong> akun user yang terhubung.
        </p>
      </div>

      <div className="sub-tabs" style={{marginBottom:20}}>
        <button className={`sub-tab ${activeTab==='table'?'active':''}`} onClick={()=>setActiveTab('table')}>→ Database</button>
        <button className={`sub-tab ${activeTab==='import'?'active':''}`} onClick={()=>setActiveTab('import')}>→ Import CSV</button>
      </div>

      {activeTab === 'table' && (
        <>
          <div className="card elevated">
            <div className="card-header">
              <div>
                <div className="card-title">ESG Ratings Database · {ratings.length} Perusahaan</div>
                <div className="card-sub">Data digunakan oleh user yang terhubung ke perusahaan tersebut</div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="Cari perusahaan / ticker…"
                  style={{padding:'8px 12px',border:'1px solid var(--border-default)',borderRadius:'var(--radius-md)',fontSize:13,width:220,fontFamily:'var(--font-body)'}} />
                <button className="button primary" onClick={openAdd}>
                  <Icon name="plus" size={12}/><span>Tambah</span>
                </button>
              </div>
            </div>
            <div className="table-wrap">
              <table className="data">
                <thead>
                  <tr>
                    <th>Perusahaan</th>
                    <th>MSCI</th>
                    <th>Sustainalytics</th>
                    <th>CDP</th>
                    <th>Refinitiv</th>
                    <th>Bloomberg</th>
                    <th>Update</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(r => (
                    <tr key={r.id}>
                      <td>
                        <div style={{fontWeight:600,fontSize:13}}>{r.companyName}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{r.ticker} · {r.industry}</div>
                      </td>
                      <td>
                        <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:14,color:msciColor(r.msci)}}>{r.msci||'—'}</span>
                        {r.msciScore ? <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:4}}>({r.msciScore})</span> : null}
                      </td>
                      <td>
                        <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:13}}>{r.sustainalytics||'—'}</span>
                        {r.sustainalyticsRisk && <span className="badge neutral" style={{fontSize:9,marginLeft:4}}>{r.sustainalyticsRisk}</span>}
                      </td>
                      <td><span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:14,color:msciColor(r.cdp==='A'||r.cdp==='A-'?'AA':'B')}}>{r.cdp||'—'}</span></td>
                      <td><span style={{fontFamily:'var(--font-mono)',fontWeight:700}}>{r.refinitiv||'—'}{r.refinitiv?<span style={{fontSize:10,color:'var(--text-muted)'}}>/100</span>:null}</span></td>
                      <td><span style={{fontFamily:'var(--font-mono)',fontWeight:700}}>{r.bloomberg||'—'}{r.bloomberg?<span style={{fontSize:10,color:'var(--text-muted)'}}>/100</span>:null}</span></td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)'}}>{r.lastUpdated||'—'}</td>
                      <td style={{display:'flex',gap:4}}>
                        <button className="icon-button" style={{width:28,height:28}} onClick={()=>openEdit(r)}><Icon name="edit" size={12}/></button>
                        <button className="icon-button" style={{width:28,height:28,color:'var(--rose-glow)',borderColor:'rgba(90,170,237,0.3)'}} onClick={()=>dataStore.esg.remove(r.id)}><Icon name="trash" size={12}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

      {activeTab === 'import' && (
        <div className="two-col">
          <div className="card elevated">
            <div className="card-header">
              <div>
                <div className="card-title">Template Excel / CSV</div>
                <div className="card-sub">Download template, isi data, lalu paste di kolom kanan</div>
              </div>
            </div>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:16,lineHeight:1.55}}>
              Template CSV berisi kolom-kolom yang dibutuhkan: nama perusahaan, ticker, industri, dan rating dari masing-masing penyedia.
              Isi template di Excel/Google Sheets, lalu export ke CSV dan paste isinya di kolom import.
            </p>
            <div style={{background:'var(--bg-canvas)',borderRadius:8,padding:14,marginBottom:16,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-secondary)',lineHeight:1.8}}>
              <div style={{fontWeight:700,marginBottom:4,color:'var(--text-primary)'}}>Kolom yang tersedia:</div>
              <div>companyName · ticker · industry</div>
              <div>msci (AAA–CCC) · msciScore (0–10)</div>
              <div>sustainalytics (0–100) · sustainalyticsRisk</div>
              <div>cdp (A–D) · refinitiv (0–100) · bloomberg (0–100)</div>
              <div>notes</div>
            </div>
            <button className="button primary" onClick={downloadTemplate}>
              <Icon name="download" size={12}/><span>Download Template CSV</span>
            </button>
          </div>
          <div className="card elevated">
            <div className="card-header">
              <div>
                <div className="card-title">Import Data CSV</div>
                <div className="card-sub">Paste isi file CSV di bawah ini</div>
              </div>
            </div>
            <textarea
              value={importText}
              onChange={e=>setImportText(e.target.value)}
              placeholder={'companyName,ticker,industry,msci,...\nPT Contoh Tbk,CNTOH,Manufacturing,BB,...'}
              style={{width:'100%',height:200,fontFamily:'var(--font-mono)',fontSize:12,padding:'10px 12px',
                border:'1px solid var(--border-default)',borderRadius:'var(--radius-md)',resize:'vertical',
                background:'var(--bg-canvas)',marginBottom:12,outline:'none'}}
            />
            {importMsg && (
              <div style={{padding:'10px 14px',background: importMsg.startsWith('✓')?'#ECFDF5':'#FEF2F2',
                border:'1px solid '+(importMsg.startsWith('✓')?'#6EE7B7':'#FECACA'),
                borderRadius:8,fontSize:13,color: importMsg.startsWith('✓')?'#065F46':'#991B1B',marginBottom:12}}>
                {importMsg}

            <button className="button primary" onClick={handleImport} disabled={!importText.trim()}>
              <Icon name="download" size={12}/><span>Proses Import</span>
            </button>

      )}

      {modalOpen && (

const GhgDashboard = ({ profile, setActiveView }) => {
  const p = profile || DEFAULT_PROFILE;
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const trendRef = useRef(null);
  const trendInst = useRef(null);

  const cur = profileEnergy(p, LATEST_YEAR);
  const s1 = cur.scope1, s2 = cur.scope2, s3 = profileScope3(p);
  const grand = s1 + s2 + s3;
  const fmt = (n) => Math.round(n).toLocaleString('id-ID');
  const intensity = p.revenue ? (grand / p.revenue * 1000).toFixed(2) : '—';

  // Donut Scope 1/2/3
  useEffect(() => {
    if (!chartRef.current || !window.Chart) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current.getContext('2d'), {
      type: 'doughnut',

    });
    return () => { if (chartInst.current) chartInst.current.destroy(); };
  }, [s1, s2, s3]);

  // Trend emisi 5 tahun (Scope 1+2)

    if (!trendRef.current || !window.Chart) return;

    const data = PROFILE_YEARS.map(y => Math.round(profileEnergy(p, y).total));

            </thead>
            <tbody>
              {RISKS.map(r => {

                  <tr key={r.id}>

                    <td style={{fontSize: 12}}>{r.time}</td>
                    <td style={{fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-body)'}}>{r.impact}</td>
                    {canEdit && (
                      <td style={{whiteSpace:'nowrap'}}>
                        <button className="icon-button" style={{width:28, height:28, display:'inline-flex'}} onClick={() => openEditRisk(r)} title="Edit"><Icon name="edit" size={12} /></button>
                        <button className="icon-button" style={{width:28, height:28, marginLeft:4, display:'inline-flex', color:'var(--rose-glow)', borderColor:'rgba(90,170,237,0.3)'}} onClick={() => handleDeleteRisk(r.id)} title="Hapus"><Icon name="trash" size={12} /></button>
                      </td>

                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      <DataEditModal
        open={modalOpen}
        onClose={() => setModalOpen(false)}

        title={editingItem && editingItem.id ? (editKind === 'risk' ? 'Edit Risiko' : 'Edit Topik Materialitas') : (editKind === 'risk' ? 'Tambah Risiko' : 'Tambah Topik Materialitas')}
        fields={editKind === 'risk' ? RISK_FIELDS : MATER_FIELDS}
        initial={editingItem}
      />
    </div>
  );
};

// =======================================
// DECARBONIZATION ROADMAP PLANNER - ADVANCED
// =======================================
// =======================================
// STRATEGY ADVISOR — deterministic portfolio engine
// "Otak" transparan & auditable: skor tiap opportunity dari angka feasibility,
// lalu seleksi terbatas anggaran (capital rationing) + roadmap bertahap.
// Lapisan narasi API Claude bisa dipasang belakangan (lihat buildNarrative).
// =======================================
const STRAT_PRESETS = {
  conservative: { econ: 35, emisi: 10, speed: 45, strat: 10 },
  balanced:     { econ: 30, emisi: 30, speed: 20, strat: 20 },
  aggressive:   { econ: 15, emisi: 45, speed: 10, strat: 30 },
};
const STRAT_LABELS = { econ: 'Ekonomi (ROI)', emisi: 'Reduksi Emisi', speed: 'Kecepatan Payback', strat: 'Strategis / Compliance' };
const STRAT_ORDER = ['econ', 'emisi', 'speed', 'strat'];

const scoreOpportunities = (opps, w) => {
  const total = (w.econ + w.emisi + w.speed + w.strat) || 1;
  const wn = { econ: w.econ / total, emisi: w.emisi / total, speed: w.speed / total, strat: w.strat / total };
  const arr = opps.map(o => {
    const capex = o.capex || 0;
    const benefit = o.annualSavings || 0;
    const emis = o.emissionCut || 0;
    const payback = (o.payback && o.payback > 0) ? o.payback : (capex > 0 && benefit > 0 ? capex / benefit : 0.1);
    const roi = capex > 0 ? benefit / capex : 1.5;            // capex 0 (instrumen finansial) → ROI tinggi
    const speed = payback > 0 ? 1 / payback : 8;
    const strat = ({ high: 1, medium: 0.6, low: 0.3 }[o.priority] || 0.5)
      + ((o.taxonomy && o.taxonomy.indexOf('Green') >= 0) ? 0.15 : 0)
      + (o.taxonomy === 'Enabler' ? 0.30 : 0);
    return { o, capex, benefit, emis, payback, roi, speed, strat };
  });
  const mk = (key) => { const mx = Math.max(...arr.map(a => a[key]), 0.0001); return (v) => v / mx; };
  const nRoi = mk('roi'), nEmis = mk('emis'), nSpeed = mk('speed'), nStrat = mk('strat');
  return arr.map(a => ({
    ...a,
    score: 100 * (wn.econ * nRoi(a.roi) + wn.emisi * nEmis(a.emis) + wn.speed * nSpeed(a.speed) + wn.strat * nStrat(a.strat)),
  })).sort((x, y) => y.score - x.score);
};

const selectPortfolio = (scored, budget) => {
  let spent = 0;
  const items = scored.map(s => {
    if (s.score < 22) return { ...s, decision: 'TINJAU', reason: `Skor ${s.score.toFixed(0)} rendah untuk lensa strategi saat ini` };
    if (s.capex === 0) return { ...s, decision: 'AMBIL', reason: 'Tanpa CAPEX — manfaat langsung, prioritaskan' };
    if (spent + s.capex <= budget) { spent += s.capex; return { ...s, decision: 'AMBIL', reason: `Skor ${s.score.toFixed(0)}, muat dalam anggaran` }; }
    return { ...s, decision: 'TUNDA', reason: `Skor ${s.score.toFixed(0)} layak, tapi melebihi sisa anggaran` };
  });
  return { items, spent };
};

const roadmapPhaseStart = (s) => {
  if (s.capex === 0 || (s.o.taxonomy === 'Enabler')) return 2026;     // enabler & tanpa-modal lebih dulu
  const pb = s.payback || 5;
  if (pb < 3) return 2026;
  if (pb < 5) return 2027;
  if (pb < 8) return 2028;
  return 2029;
};

// Narasi deterministik (titik tukar untuk lapisan API Claude di masa depan)
const buildNarrative = ({ profile, picks, spent, budget, emisCut, requiredCut, top3 }) => {
  const util = budget > 0 ? Math.round((spent / budget) * 100) : 0;
  const meets = emisCut >= requiredCut;
  const namesTop = top3.map(s => s.o.title).join(', ');

const mdInline = (text, kp) => {
  const parts = String(text).split(/\*\*/);
  return parts.map((p, i) => i % 2 === 1 ? <strong key={kp + '-' + i}>{p}</strong> : <span key={kp + '-' + i}>{p}</span>);
};
const mdCells = (l) => { let s = l.trim(); if (s.startsWith('|')) s = s.slice(1); if (s.endsWith('|')) s = s.slice(0, -1); return s.split('|').map(c => c.trim()); };
const mdIsRow = (l) => l.indexOf('|') >= 0 && l.trim().length > 0;
const mdIsSep = (l) => /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(l) && l.includes('-');
const renderMarkdown = (text) => {
  if (!text) return null;
  const lines = String(text).split('\n');
  const blocks = []; let list = null; let i = 0;
  const flush = () => { if (list) { blocks.push({ type: 'ul', items: list }); list = null; } };
  while (i < lines.length) {
    const line = lines[i].replace(/\s+$/, '');
    if (!line.trim()) { flush(); i++; continue; }
    if (mdIsRow(line) && i + 1 < lines.length && mdIsSep(lines[i + 1])) {
      flush();
      const header = mdCells(line); const rows = []; i += 2;
      while (i < lines.length && mdIsRow(lines[i]) && lines[i].trim() && !mdIsSep(lines[i])) { rows.push(mdCells(lines[i])); i++; }
      blocks.push({ type: 'table', header, rows }); continue;
    }
    let m;
    if ((m = line.match(/^#{1,4}\s+(.*)/))) { flush(); blocks.push({ type: 'h', text: m[1] }); }
    else if ((m = line.match(/^\s*[-*]\s+(.*)/))) { if (!list) list = []; list.push(m[1]); }
    else if ((m = line.match(/^\s*\d+\.\s+(.*)/))) { if (!list) list = []; list.push(m[1]); }
    else { flush(); blocks.push({ type: 'p', text: line }); }
    i++;
  }
  flush();
  return blocks.map((b, idx) => {
    if (b.type === 'h') return <div key={idx} style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 15, marginTop: idx ? 18 : 0, marginBottom: 8, color: 'var(--purple-700)' }}>{mdInline(b.text, 'h' + idx)}</div>;
    if (b.type === 'ul') return <ul key={idx} style={{ margin: '6px 0 12px', paddingLeft: 20 }}>{b.items.map((it, j) => <li key={j} style={{ fontSize: 13, lineHeight: 1.6, marginBottom: 4 }}>{mdInline(it, 'l' + idx + j)}</li>)}</ul>;
    if (b.type === 'table') return (
      <div key={idx} style={{ overflowX: 'auto', margin: '12px 0' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead><tr>{b.header.map((h, j) => <th key={j} style={{ textAlign: 'left', padding: '8px 10px', borderBottom: '2px solid var(--border-soft)', fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>{mdInline(h, 'th' + idx + j)}</th>)}</tr></thead>
          <tbody>{b.rows.map((rw, ri) => <tr key={ri} style={{ borderBottom: '1px solid var(--border-soft)' }}>{rw.map((c, ci) => <td key={ci} style={{ padding: '8px 10px', verticalAlign: 'top', fontSize: 12, lineHeight: 1.5 }}>{mdInline(c, 'td' + idx + ri + ci)}</td>)}</tr>)}</tbody>
        </table>
      </div>
    );
    return <p key={idx} style={{ fontSize: 13, lineHeight: 1.7, margin: '0 0 11px' }}>{mdInline(b.text, 'p' + idx)}</p>;
  });
};

const escHtml = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const inlineBold = (s) => s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
const mdToHtml = (text) => {
  const lines = String(text || '').split('\n');
  let html = '', inList = false, i = 0;
  const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
  const cells = (l) => { let s = escHtml(l).trim(); if (s.startsWith('|')) s = s.slice(1); if (s.endsWith('|')) s = s.slice(0, -1); return s.split('|').map(c => c.trim()); };
  while (i < lines.length) {
    const line = lines[i].replace(/\s+$/, '');
    if (!line.trim()) { closeList(); i++; continue; }
    if (mdIsRow(line) && i + 1 < lines.length && mdIsSep(lines[i + 1])) {
      closeList();
      const header = cells(line); let body = ''; i += 2;
      while (i < lines.length && mdIsRow(lines[i]) && lines[i].trim() && !mdIsSep(lines[i])) { body += '<tr>' + cells(lines[i]).map(x => `<td>${inlineBold(x)}</td>`).join('') + '</tr>'; i++; }
      html += `<table><thead><tr>${header.map(h => `<th>${inlineBold(h)}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table>`; continue;
    }
    let m;
    if ((m = line.match(/^#{1,4}\s+(.*)/))) { closeList(); html += `<h2>${inlineBold(escHtml(m[1]))}</h2>`; }
    else if ((m = line.match(/^\s*[-*]\s+(.*)/))) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${inlineBold(escHtml(m[1]))}</li>`; }
    else if ((m = line.match(/^\s*\d+\.\s+(.*)/))) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${inlineBold(escHtml(m[1]))}</li>`; }
    else { closeList(); html += `<p>${inlineBold(escHtml(line))}</p>`; }
    i++;
  }
  closeList();
  return html;
};

        const user = `DATA DASHBOARD (sumber angka terverifikasi):\n${data}\n\nKONTEKS TAMBAHAN PENGGUNA (boleh kosong):\n${aiContext.trim() || '(tidak ada)'}\n\nMODE: ${mode.label} (target ${mode.pages} halaman). ${b > 0 ? 'Ini LANJUTAN laporan yang sama; JANGAN tulis ulang/rangkum bagian sebelumnya. ' : ''}Tulis HANYA bagian berikut, pakai judul heading persis:\n${secs.join('\n')}\n\n${mode.deep ? 'Tulis MENDALAM: 6–12 paragraf padat per bagian + tabel pendukung.' : 'Padat, strategis, setiap bagian beberapa paragraf + tabel bila relevan.'}`;
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiKey.trim()}` },
          body: JSON.stringify({ model: (aiModel || 'gpt-5.4-mini'), max_completion_tokens: 8000, messages: [{ role: 'system', content: system }, { role: 'user', content: user }] }),
        });
        if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status} — ${t.slice(0, 240)}`); }
        const dj = await res.json();
        const txt = dj && dj.choices && dj.choices[0] && dj.choices[0].message && dj.choices[0].message.content;
        if (!txt) throw new Error('Respons kosong dari API pada bagian ' + (b + 1) + '.');
        full += (full ? '\n\n' : '') + txt.trim();
        setAiText(full);
      }
      setAiOpen(false);
    } catch (e) {
      setAiError(`Gagal memanggil OpenAI: ${e.message}. Bila error jaringan/CORS (umum saat file dibuka via file://), jalankan lewat local server ("python -m http.server") atau proxy. Bagian yang sudah jadi tetap tersimpan.`);

  const exportPDF = () => {

    const renderHiRes = (type, data, options) => {
      if (typeof Chart === 'undefined') return null;
      const dims = HIRES[type] || [620, 360]; let cv = null;
      try {
        cv = document.createElement('canvas'); cv.width = dims[0]; cv.height = dims[1];
        cv.style.cssText = 'position:absolute;left:-99999px;top:0';
        document.body.appendChild(cv);
        const ch = new Chart(cv.getContext('2d'), { type, data: cloneData(data), options: { ...options, responsive: false, maintainAspectRatio: false, animation: false, devicePixelRatio: 3 } });
        const url = ch.toBase64Image('image/png', 1); ch.destroy(); return url;
      } catch (e) { return null; } finally { if (cv && cv.parentNode) cv.parentNode.removeChild(cv); }
    };
    const figBlock = (id) => { const f = figById(id); if (!f) return ''; let src = renderHiRes(f[2], f[3], f[4]); if (!src) { try { src = reg[id] ? reg[id].toBase64Image() : null; } catch (e) { src = null; } } if (!src) return ''; return `<figure class="fig"><img src="${src}"/><figcaption>${escHtml(f[1])}</figcaption></figure>`; };
    let profHtml = `<h2>Company Context</h2><table class="facts"><tbody>${profFacts.map(ff => `<tr><th>${escHtml(ff[0])}</th><td>${escHtml(String(ff[1]))}</td></tr>`).join('')}</tbody></table>`;

    const portTable = `<h3>Tabel Portofolio Peluang</h3><table><thead><tr><th>#</th><th>Opportunity</th><th>Category</th><th>CAPEX</th><th>Benefit</th><th>Payback</th><th>Emisi</th><th>Skor</th><th>Decision</th></tr></thead><tbody>${rows}</tbody></table>`;
    // aturan penempatan figure ke bagian (mengikuti posisi figure di template docx)
    const FIGRULES = [
      { test: /intisari|executive summary|ringkasan eksekutif/i, ids: ['es1', 'es2'], port: false },
      { test: /portofolio|opportunity portfolio|portfolio peluang|peluang iklim/i, ids: ['opp1'], port: true },
      { test: /feasibility|kelayakan|capital allocation|alokasi modal|cashflow|cash flow|finansial/i, ids: ['fin1'], port: false },
      { test: /emission|emisi|abatement|abatemen|carbon exposure|eksposur karbon/i, ids: ['abt1'], port: false },
      { test: /\brisk\b|risiko|materiality|materialitas/i, ids: ['risk1', 'mat1'], port: false },
      { test: /scenario|skenario|resilien/i, ids: ['scen1'], port: false },
      { test: /peer|benchmark|market position|posisi pasar|esg rating/i, ids: ['peer1'], port: false },
      { test: /disclosure|compliance|kepatuhan|pspk|readiness/i, ids: ['comp1'], port: false },
    ];
    const matchRule = (h) => FIGRULES.find(r => r.test.test(h));
    let narrativeHtml = '';
    if (aiText) {
      const lines = aiText.split('\n');
      const secs = []; let cur = { head: null, body: [] };
      for (const ln of lines) { const m = ln.match(/^\s*##\s+(.*)/); if (m) { secs.push(cur); cur = { head: m[1].trim(), body: [] }; } else cur.body.push(ln); }
      secs.push(cur);
      // helper: wrap multiple <figure class="fig"> dalam .fig-row (2-col), biarkan non-fig content di luar
      const pairFigs = (html) => {
        const n = (html.match(/class="fig"/g)||[]).length;
        if (n < 2) return html;
        const figs = html.match(/<figure class="fig">[\s\S]*?<\/figure>/g) || [];
        const rest = html.replace(/<figure class="fig">[\s\S]*?<\/figure>/g, '').trim();
        return `<div class="fig-row">${figs.join('')}</div>` + (rest ? rest : '');
      };
      const placed = new Set(); let portPlaced = false;
      for (const s of secs) {
        let figHtml = '';
        if (s.head) {
          const rule = matchRule(s.head);
          if (rule) { rule.ids.forEach(id => { if (!placed.has(id)) { const fb = figBlock(id); if (fb) { figHtml += fb; placed.add(id); } } }); if (rule.port && !portPlaced) { figHtml += portTable; portPlaced = true; } }
          narrativeHtml += `<h2>${escHtml(s.head)}</h2>`;
        }
        const bodyTxt = s.body.join('\n').trim();
        let bodyHtml = bodyTxt ? mdToHtml(bodyTxt) : '';
        if (figHtml) { const ins = pairFigs(figHtml); const idx = bodyHtml.indexOf('</p>'); bodyHtml = (idx >= 0) ? (bodyHtml.slice(0, idx + 4) + ins + bodyHtml.slice(idx + 4)) : (bodyHtml + ins); }
        narrativeHtml += bodyHtml;

      const leftoverArr = FIGS.filter(f => !placed.has(f[0])).map(f => figBlock(f[0])).filter(Boolean);
      if (leftoverArr.length) { let lH=''; for(let k=0;k<leftoverArr.length;k+=2){const p=leftoverArr.slice(k,k+2);lH+=p.length>1?`<div class="fig-row">${p.join('')}</div>`:p[0];} narrativeHtml+=`<h2>Lampiran — Grafik Pendukung</h2>`+lH; }

    } else {
      const allFigsArr = FIGS.map(f => figBlock(f[0])).filter(Boolean);
      let allFigs=''; for(let k=0;k<allFigsArr.length;k+=2){const p=allFigsArr.slice(k,k+2);allFigs+=p.length>1?`<div class="fig-row">${p.join('')}</div>`:p[0];}
      narrativeHtml = (allFigs ? `<h2>Chart Inventory</h2>${allFigs}` : '') + portTable + `<p><em>Bagian naratif (Bagian 4–14) belum dihasilkan — masukkan API key, klik "Susun laporan", lalu Export PDF agar grafik menyebar ke tiap bagian analisisnya seperti template.</em></p>`;
    }

  return (

      </div>

      <div className="card elevated" style={{ marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          {[['Prepared for', 'Board of Directors'], ['Company', profile?.companyName || '-'], ['Industry', sector], ['Period', periode]].map(([k, v]) => (<div key={k}><div style={{ color: 'var(--text-muted)', letterSpacing: '0.1em' }}>{k.toUpperCase()}</div><div style={{ fontWeight: 700, fontSize: 13 }}>{v}</div></div>))}

          {profFacts.map(([k, v]) => (<div key={k}><div style={pfL}>{k}</div><div style={{ fontWeight: 700, fontSize: 13, textTransform: (k === 'Lensa Strategi' || k === 'Kategori Emiter') ? 'capitalize' : 'none' }}>{v}</div></div>))}

// Pencocokan berbasis keyword (menangkap maksud dari kalimat bebas)
const matchKB = (text) => {
  const t = ' ' + text.toLowerCase().replace(/[^a-z0-9°²₂\s]/g, ' ').replace(/\s+/g, ' ') + ' ';
  const tokens = new Set(t.trim().split(' '));
  let best = null, bestScore = 0;
  for (const e of COPILOT_KB) {
    let score = 0;
    for (const kw of e.keywords) {
      if (kw.includes(' ')) { if (t.includes(' ' + kw + ' ') || t.includes(kw)) score += 3; }
      else if (tokens.has(kw)) score += 1;
    }
    if (score > bestScore) { bestScore = score; best = e; }
  }
  return bestScore >= 1 ? best : null;
};

const AiCopilot = ({ activeView, profile }) => {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const bodyRef = useRef(null);

  const ctx = AI_RESPONSES[activeView] || AI_RESPONSES.overview;

  useEffect(() => {
    if (open) {
      setMessages([{ from: 'ai', text: ctx.welcome, chips: ctx.chips }]);
    }
  }, [open, activeView]);

  useEffect(() => {
    if (bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [messages, typing]);

  const send = (text) => {
    if (!text.trim()) return;
    const userMsg = { from: 'user', text };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setTyping(true);

    setTimeout(() => {
      const lower = text.toLowerCase();
      let response, chips;
      const hit = matchKB(text);
      if (/(^|\s)(halo|hai|hi|hello|pagi|siang|sore|malam)(\s|$)/.test(lower)) {
        response = `Hai${profile?.companyName ? ', tim ' + profile.companyName : ''}! Saya QnA. Tanyakan apa saja dengan bahasa Anda sendiri — mis. "bedanya scope 1 2 3", "kenapa payback penting", atau "apa itu harga karbon". Saya tangkap maksudnya.`;
        chips = ['Apa beda Scope 1, 2, 3?', 'Apa itu harga karbon / ICP?', 'Bagaimana 3 level transisi (Low/Moderate/High)?'];
      } else if (/(terima kasih|makasih|thanks|thank you)/.test(lower)) {
        response = 'Sama-sama! Kalau ada yang ingin didalami lagi soal emisi, kelayakan, skenario, atau peluang transisi, tinggal ketik saja.';
      } else if (hit) {
        response = typeof hit.answer === 'function' ? hit.answer(profile) : hit.answer;
        // tawarkan 3 topik lain sebagai lanjutan
        chips = COPILOT_KB.filter(e => e.id !== hit.id).sort(() => Math.random() - 0.5).slice(0, 3).map(e => e.title);
      } else {
        response = `Saya belum yakin menangkap maksud "**${text}**". Coba pakai kata kunci topiknya — misalnya *emisi/scope*, *NPV/IRR/payback*, *harga karbon*, *skenario*, *level transisi*, *CBAM*, atau *baseline*. Atau pilih salah satu topik di bawah:`;
        chips = ['Apa beda Scope 1, 2, 3?', 'Apa beda NPV, IRR, dan payback?', 'Untuk apa Climate Scenario?', 'Bagaimana 3 level transisi (Low/Moderate/High)?'];
      }

      setMessages(prev => [...prev, { from: 'ai', text: response, chips }]);
      setTyping(false);
    }, 600 + Math.random() * 500);
  };

  const renderMarkdown = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) => {
      if (p.startsWith('**') && p.endsWith('**')) {
        return <strong key={i}>{p.slice(2, -2)}</strong>;
      }
      return p.split('\n').map((line, li) => (
        <React.Fragment key={`${i}-${li}`}>
          {li > 0 && <br />}{line}
        </React.Fragment>
      ));
    });
  };

  if (!open) {
    return (
      <button className="ai-fab" onClick={() => setOpen(true)} title="Buka QnA">
        <span style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 17, letterSpacing: '0.01em', color: '#fff' }}>QnA</span>
      </button>
    );
  }

  return (
    <div className="ai-panel">
      <div className="ai-panel-header">
        <button className="ai-panel-close" onClick={() => setOpen(false)} title="Tutup">
          <Icon name="x" size={14} />
        </button>
        <div className="ai-panel-title">
          <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 26, height: 26, borderRadius: 7, background: 'rgba(255,255,255,0.18)', fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 12, marginRight: 4 }}>QnA</span>
          QnA Assistant
        </div>
        <div className="ai-panel-tag">// Climate & PSPK Assistant · v0.4</div>
      </div>
      <div className="ai-panel-body" ref={bodyRef}>
        {messages.map((m, idx) => (
          <React.Fragment key={idx}>
            <div className={`ai-msg ${m.from === 'user' ? 'from-user' : ''}`}>
              <div className="ai-msg-avatar">{m.from === 'user' ? (profile?.companyName ? profile.companyName.charAt(0) : 'U') : 'AI'}</div>
              <div className="ai-msg-bubble">{renderMarkdown(m.text)}</div>
            </div>
            {m.chips && (
              <div className="ai-suggestions">
                {m.chips.map(c => (
                  <button key={c} className="ai-suggestion-chip" onClick={() => send(c)}>{c}</button>
                ))}
              </div>
            )}
          </React.Fragment>
        ))}
        {typing && (
          <div className="ai-msg">
            <div className="ai-msg-avatar">AI</div>
            <div className="ai-msg-bubble">
              <div className="ai-typing"><span></span><span></span><span></span></div>
            </div>
          </div>
        )}
      </div>
      <div className="ai-panel-input">
        <input
          type="text"
          placeholder="Tanya QnA…"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') send(input); }}
        />
        <button onClick={() => send(input)} title="Send">
          <Icon name="send" size={16} />
        </button>
      </div>
    </div>
  );
};

const EsgScore = ({ profile }) => {
  const radarRef = useRef(null);
  const trajectoryRef = useRef(null);

  const pillarScores = useMemo(() => {
    const result = {};
    Object.entries(ESG_RUBRIC).forEach(([key, pillar]) => {
      const avg = pillar.items.reduce((s, it) => s + it.score, 0) / pillar.items.length;
      result[key] = Math.round(avg);
    });
    return result;
  }, []);

  const totalScore = useMemo(() => {
    let weighted = 0;
    Object.entries(ESG_RUBRIC).forEach(([key, pillar]) => {
      weighted += pillarScores[key] * pillar.weight;
    });
    return Math.round(weighted);
  }, [pillarScores]);

  const tier = useMemo(() => {
    if (totalScore >= 80) return { letter: 'A', label: 'Leader', desc: 'Praktik iklim setara emiten papan atas. Posisi kuat untuk akses Green Bond, Sustainability-Linked Loan, dan inklusi indeks ESG global.' };
    if (totalScore >= 65) return { letter: 'B', label: 'Advanced', desc: 'Fondasi PSPK 1-2 solid. Fokus pada verifikasi pihak ketiga & quantification climate VaR untuk naik ke tier Leader.' };
    if (totalScore >= 50) return { letter: 'C', label: 'Developing', desc: 'Compliance dasar tercapai, namun beberapa pillar masih partial. Prioritaskan internal carbon price & Scope 3 expansion.' };
    return { letter: 'D', label: 'Initiating', desc: 'Tahap awal kepatuhan PSPK. Mulai dari governance struktur & inventarisasi Scope 1-2 sebagai foundation.' };
  }, [totalScore]);

  const userRank = useMemo(() => {
    const allScores = [...PEER_RANKINGS.map(p => p.score), totalScore].sort((a, b) => b - a);
    return allScores.indexOf(totalScore) + 1;
  }, [totalScore]);

  const peerAvg = useMemo(() => {
    return Math.round(PEER_RANKINGS.reduce((s, p) => s + p.score, 0) / PEER_RANKINGS.length);
  }, []);

  const fullRanking = useMemo(() => {
    const companyName = profile?.companyName || 'PT Mitra Industri Tbk';
    const combined = [
      ...PEER_RANKINGS,
      { name: companyName, score: totalScore, sector: profile?.industry || 'Manufacturing', isYou: true },
    ].sort((a, b) => b.score - a.score);
    return combined;
  }, [totalScore, profile]);

  useEffect(() => {
    if (!radarRef.current) return;
    const ctx = radarRef.current.getContext('2d');
    if (radarRef.current._chart) radarRef.current._chart.destroy();
    radarRef.current._chart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: Object.values(ESG_RUBRIC).map(p => p.name),
        datasets: [
          {
            label: 'Skor Anda',
            data: Object.keys(ESG_RUBRIC).map(k => pillarScores[k]),
            backgroundColor: 'rgba(90, 170, 237, 0.25)',
            borderColor: '#5AAAED',
            borderWidth: 2,
            pointBackgroundColor: '#5AAAED',
            pointBorderColor: '#FFFFFF',
            pointRadius: 4,
          },
          {
            label: 'Peer Average',
            data: Object.keys(ESG_RUBRIC).map(() => peerAvg),
            backgroundColor: 'rgba(122, 174, 216, 0.15)',
            borderColor: 'rgba(122, 174, 216, 0.7)',
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointBackgroundColor: 'rgba(122, 174, 216, 0.9)',
            pointRadius: 3,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#FFFFFF', font: { family: 'Aptos', size: 11 } },
          },
        },
        scales: {
          r: {
            min: 0, max: 100,
            ticks: { color: 'rgba(122, 174, 216, 0.5)', backdropColor: 'transparent', stepSize: 25, font: { size: 9 } },
            grid: { color: 'rgba(122, 174, 216, 0.18)' },
            angleLines: { color: 'rgba(122, 174, 216, 0.22)' },
            pointLabels: { color: '#E6EEF8', font: { family: 'Aptos', size: 10.5, weight: '600' } },
          },
        },
      },
    });
  }, [pillarScores, peerAvg]);

  useEffect(() => {
    if (!trajectoryRef.current) return;
    const ctx = trajectoryRef.current.getContext('2d');
    if (trajectoryRef.current._chart) trajectoryRef.current._chart.destroy();
    const history = [
      Math.max(28, totalScore - 32),
      Math.max(32, totalScore - 24),
      Math.max(38, totalScore - 18),
      Math.max(44, totalScore - 12),
      Math.max(52, totalScore - 6),
      totalScore,
    ];
    trajectoryRef.current._chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Q1 2025', 'Q2 2025', 'Q3 2025', 'Q4 2025', 'Q1 2026', 'Q2 2026'],
        datasets: [{
          label: 'ESG Score',
          data: history,
          borderColor: '#3B76C0',
          backgroundColor: 'rgba(59, 118, 192, 0.12)',
          borderWidth: 2.5,
          tension: 0.35,
          fill: true,
          pointBackgroundColor: '#5AAAED',
          pointBorderColor: '#FFFFFF',
          pointBorderWidth: 2,
          pointRadius: 5,
          pointHoverRadius: 7,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, ticks: { color: '#8B7BA8', font: { family: 'Aptos', size: 10 } }, grid: { color: '#D5E8F5' } },
          x: { ticks: { color: '#8B7BA8', font: { family: 'Aptos', size: 10 } }, grid: { display: false } },
        },
      },
    });
  }, [totalScore]);

  return (
    <div>
      <div className="view-header">
        <div>
          <div className="view-eyebrow">PSPK 1-2 · ESG Performance</div>
          <h1 className="view-title">ESG Performance Score</h1>
          <p className="view-sub">
            Penilaian terintegrasi 5 pilar berdasarkan rubrik PSPK 1-2 (IFRS S1/S2), TCFD,
            dan praktik terbaik emiten ESG papan atas BEI.
          </p>
        </div>
      </div>

      <div className="esg-hero">
        <div className="esg-hero-left">
          <div className="esg-score-eyebrow">Skor Keseluruhan · {profile?.companyName || 'PT Mitra Industri Tbk'}</div>
          <div>
            <span className="esg-score-big">{totalScore}</span>
            <span className="esg-score-max">/100</span>
          </div>
          <div className="esg-tier-pill">Tier {tier.letter} · {tier.label}</div>
          <div className="esg-tier-desc">{tier.desc}</div>
          <div className="esg-stats-row">
            <div className="esg-stat">
              <div className="esg-stat-label">Ranking Sektor</div>
              <div className="esg-stat-val">#{userRank}<span className="esg-stat-of">/{PEER_RANKINGS.length + 1}</span></div>
            </div>
            <div className="esg-stat">
              <div className="esg-stat-label">Peer Avg</div>
              <div className="esg-stat-val">{peerAvg}<span className="esg-stat-of">/100</span></div>
            </div>
            <div className="esg-stat">
              <div className="esg-stat-label">Gap to Leader</div>
              <div className="esg-stat-val">{Math.max(0, 80 - totalScore)}<span className="esg-stat-of">pt</span></div>
            </div>
          </div>
        </div>
        <div className="esg-hero-right">
          <div className="esg-radar-wrap">
            <canvas ref={radarRef}></canvas>
          </div>
        </div>
      </div>

      <div style={{marginTop: 28}}>
        <div className="section-title">
          <Icon name="layers" size={18} />
          <span>Breakdown per Pilar</span>
        </div>
        <div className="esg-pillar-grid">
          {Object.entries(ESG_RUBRIC).map(([key, pillar]) => (
            <div key={key} className="esg-pillar-card">
              <div className="esg-pillar-head">
                <div className="esg-pillar-icon">

// COMMAND PALETTE (⌘K Quick Search)
