    const kpis = `<div class="kpis"><div>Abatemen <b>${Math.round(emisCut).toLocaleString('id-ID')} tCO₂e/thn</b> (${pctBaseline.toFixed(1)}%)</div><div>Peluang <b>${picks.length}</b> (no-regret ${noRegret})</div><div>Investasi <b>${fmtM(spent)}</b></div><div>NPV <b>${fmtM(portfolioNPV)}</b> · ROI ${annualROI.toFixed(0)}%</div><div>PSPK <b>${pspkReadiness}%</b> readiness</div><div>Target ${target}%: <b>${meetsTarget ? 'tercapai' : 'gap ' + Math.round(gap).toLocaleString('id-ID')}</b></div></div>`;
    const reg = chartReg.current || {};
    const figById = (id) => FIGS.find(f => f[0] === id);
    const HIRES = { doughnut: [520, 380], radar: [520, 400], scatter: [560, 420], bubble: [560, 420], line: [620, 360], bar: [620, 360] };
    const cloneData = (d) => ({ ...d, labels: d.labels ? d.labels.slice() : d.labels, datasets: (d.datasets || []).map(ds => ({ ...ds, data: Array.isArray(ds.data) ? ds.data.map(x => (x && typeof x === 'object') ? { ...x } : x) : ds.data })) });
    const renderHiRes = (type, data, options) => {
      if (typeof Chart === 'undefined') return null;
      const dims = HIRES[type] || [620, 360]; let cv = null;
      try {
        cv = document.createElement('canvas'); cv.width = dims[0]; cv.height = dims[1];
        cv.style.cssText = 'position:absolute;left:-99999px;top:0';
        document.body.appendChild(cv);
        const ch = new Chart(cv.getContext('2d'), { type, data: cloneData(data), options: { ...options, responsive: false, maintainAspectRatio: false, animation: false, devicePixelRatio: 3 } });
        const url = ch.toBase64Image('image/png', 1); ch.destroy(); return url;
      } catch (e) { return null; } finally { if (cv && cv.parentNode) cv.parentNode.removeChild(cv); }
    };
    const figBlock = (id) => { const f = figById(id); if (!f) return ''; let src = renderHiRes(f[2], f[3], f[4]); if (!src) { try { src = reg[id] ? reg[id].toBase64Image() : null; } catch (e) { src = null; } } if (!src) return ''; return `<figure class="fig"><img src="${src}"/><figcaption>${escHtml(f[1])}</figcaption></figure>`; };
    let profHtml = `<h2>Company Context</h2><table class="facts"><tbody>${profFacts.map(ff => `<tr><th>${escHtml(ff[0])}</th><td>${escHtml(String(ff[1]))}</td></tr>`).join('')}</tbody></table>`;
    if (profile?.description) profHtml += `<p><strong>Deskripsi &amp; Model Bisnis:</strong> ${escHtml(profile.description)}</p>`;
    if (profile?.governanceStructure) profHtml += `<p><strong>Struktur Tata Kelola &amp; Jabatan Kunci:</strong></p><ul>${govLines.map(x => `<li>${escHtml(x)}</li>`).join('')}</ul>`;
    const rows = items.map((s, i) => `<tr><td>${i + 1}</td><td>${escHtml(s.o.title)}</td><td>${escHtml(s.o.category)}</td><td>${s.capex ? fmtM(s.capex) : '—'}</td><td>${fmtM(s.benefit)}/thn</td><td>${s.capex ? s.payback.toFixed(1) + 'y' : 'instan'}</td><td>${s.emis || '—'}</td><td>${s.score.toFixed(0)}</td><td>${s.decision}</td></tr>`).join('');
    const portTable = `<h3>Tabel Portofolio Peluang</h3><table><thead><tr><th>#</th><th>Opportunity</th><th>Category</th><th>CAPEX</th><th>Benefit</th><th>Payback</th><th>Emisi</th><th>Skor</th><th>Decision</th></tr></thead><tbody>${rows}</tbody></table>`;
    // aturan penempatan figure ke bagian (mengikuti posisi figure di template docx)
    const FIGRULES = [
      { test: /intisari|executive summary|ringkasan eksekutif/i, ids: ['es1', 'es2'], port: false },
      { test: /portofolio|opportunity portfolio|portfolio peluang|peluang iklim/i, ids: ['opp1'], port: true },
      { test: /feasibility|kelayakan|capital allocation|alokasi modal|cashflow|cash flow|finansial/i, ids: ['fin1'], port: false },
      { test: /emission|emisi|abatement|abatemen|carbon exposure|eksposur karbon/i, ids: ['abt1'], port: false },
      { test: /\brisk\b|risiko|materiality|materialitas/i, ids: ['risk1', 'mat1'], port: false },
      { test: /scenario|skenario|resilien/i, ids: ['scen1'], port: false },
      { test: /peer|benchmark|market position|posisi pasar|esg rating/i, ids: ['peer1'], port: false },
      { test: /disclosure|compliance|kepatuhan|pspk|readiness/i, ids: ['comp1'], port: false },
    ];
    const matchRule = (h) => FIGRULES.find(r => r.test.test(h));
    let narrativeHtml = '';
    if (aiText) {
      const lines = aiText.split('\n');
      const secs = []; let cur = { head: null, body: [] };
      for (const ln of lines) { const m = ln.match(/^\s*##\s+(.*)/); if (m) { secs.push(cur); cur = { head: m[1].trim(), body: [] }; } else cur.body.push(ln); }
      secs.push(cur);
      // helper: wrap multiple <figure class="fig"> dalam .fig-row (2-col), biarkan non-fig content di luar
      const pairFigs = (html) => {
        const n = (html.match(/class="fig"/g)||[]).length;
        if (n < 2) return html;
        const figs = html.match(/<figure class="fig">[\s\S]*?<\/figure>/g) || [];
        const rest = html.replace(/<figure class="fig">[\s\S]*?<\/figure>/g, '').trim();
        return `<div class="fig-row">${figs.join('')}</div>` + (rest ? rest : '');
      };
      const placed = new Set(); let portPlaced = false;
      for (const s of secs) {
        let figHtml = '';
        if (s.head) {
          const rule = matchRule(s.head);
          if (rule) { rule.ids.forEach(id => { if (!placed.has(id)) { const fb = figBlock(id); if (fb) { figHtml += fb; placed.add(id); } } }); if (rule.port && !portPlaced) { figHtml += portTable; portPlaced = true; } }
          narrativeHtml += `<h2>${escHtml(s.head)}</h2>`;
        }
        const bodyTxt = s.body.join('\n').trim();
        let bodyHtml = bodyTxt ? mdToHtml(bodyTxt) : '';
        if (figHtml) { const ins = pairFigs(figHtml); const idx = bodyHtml.indexOf('</p>'); bodyHtml = (idx >= 0) ? (bodyHtml.slice(0, idx + 4) + ins + bodyHtml.slice(idx + 4)) : (bodyHtml + ins); }
        narrativeHtml += bodyHtml;
      }
      const leftoverArr = FIGS.filter(f => !placed.has(f[0])).map(f => figBlock(f[0])).filter(Boolean);
      if (leftoverArr.length) { let lH=''; for(let k=0;k<leftoverArr.length;k+=2){const p=leftoverArr.slice(k,k+2);lH+=p.length>1?`<div class="fig-row">${p.join('')}</div>`:p[0];} narrativeHtml+=`<h2>Lampiran — Grafik Pendukung</h2>`+lH; }
      if (!portPlaced) narrativeHtml += portTable;
    } else {
      const allFigsArr = FIGS.map(f => figBlock(f[0])).filter(Boolean);
      let allFigs=''; for(let k=0;k<allFigsArr.length;k+=2){const p=allFigsArr.slice(k,k+2);allFigs+=p.length>1?`<div class="fig-row">${p.join('')}</div>`:p[0];}
      narrativeHtml = (allFigs ? `<h2>Chart Inventory</h2>${allFigs}` : '') + portTable + `<p><em>Bagian naratif (Bagian 4–14) belum dihasilkan — masukkan API key, klik "Susun laporan", lalu Export PDF agar grafik menyebar ke tiap bagian analisisnya seperti template.</em></p>`;
    }
    const body = `<div class="cover"><div class="subtitle">Board of Directors Report</div><h1>Climate Opportunities &mdash; Transition Strategy &amp; Disclosure Readiness</h1>${meta}</div><div style="padding:4px 0 8px;font-family:Helvetica,Arial,sans-serif;font-size:11px;color:#525252;">${escHtml(profile?.companyName || '-')} &nbsp;&middot;&nbsp; ${escHtml(sector)} &nbsp;&middot;&nbsp; Periode ${periode} &nbsp;&middot;&nbsp; ${(MODES[aiMode]||MODES.standard).label}</div>${kpis}${profHtml}${narrativeHtml}<div class="foot">Disusun dari dashboard CLIMATE/OPP mengikuti BOD Report Template. Angka portofolio dari engine deterministik; rincian Scope 1/2/3 & register risiko penuh ada di modul terkait. Verifikasi klaim kebijakan/eksternal sebelum keputusan resmi.</div>`;
    win.document.write(`<!doctype html><html lang="id"><head><meta charset="utf-8"><title>BOD Report — ${escHtml(profile?.companyName || 'Perusahaan')}</title><style>${CSS}</style></head><body>${body}</body></html>`);

      <MiniChart type={type} data={data} options={options} reg={chartReg} cid={cid} height={(type === 'doughnut' || type === 'bubble' || type === 'scatter' || type === 'radar') ? 250 : 220} />
    </div>
  );

  return (

        <div className="page-eyebrow">// Board of Directors Report</div>

        <p className="page-sub">Laporan strategis BOD mengikuti template: data &amp; 10 grafik lintas-modul selalu tampil; laporan naratif (Bagian 4–14) disusun AI dengan logika <strong>Observation → Insight → So what → Then what → Decision ask</strong> (perlu API key). Pilih mode panjang sesuai kebutuhan rapat.</p>
      </div>

      <div className="card elevated" style={{ marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          {[['Prepared for', 'Board of Directors'], ['Company', profile?.companyName || '-'], ['Industry', sector], ['Period', periode]].map(([k, v]) => (<div key={k}><div style={{ color: 'var(--text-muted)', letterSpacing: '0.1em' }}>{k.toUpperCase()}</div><div style={{ fontWeight: 700, fontSize: 13 }}>{v}</div></div>))}
        </div>
        <button className="button primary" style={{ fontSize: 12 }} onClick={exportPDF}><Icon name="download" size={12} /><span>Export PDF</span></button>
      </div>

      <div className="card elevated" style={{ marginBottom: 16 }}>
        <div className="card-header"><div><div className="card-title">Company Context</div><div className="card-sub">Strategic baseline untuk laporan, grafik &amp; analisis AI</div></div>
          <button className="button ghost" style={{ fontSize: 11, padding: '6px 10px' }} onClick={() => setActiveView && setActiveView('profile')}>Edit profil →</button>
        </div>

        </div>
        {profile?.description && <div style={{ marginBottom: 10 }}><div style={pfL}>Deskripsi &amp; Model Bisnis</div><div style={pfV}>{profile.description}</div></div>}
        {govLines.length > 0 && <div><div style={pfL}>Struktur Tata Kelola &amp; Jabatan Kunci</div><ul style={{ margin: '4px 0 0', paddingLeft: 18 }}>{govLines.map((g, i) => <li key={i} style={{ fontSize: 12.5, lineHeight: 1.55, marginBottom: 2 }}>{g}</li>)}</ul></div>}
        {!profile && <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>Profil belum disimpan — isi di tab <strong>Profil Perusahaan</strong> agar konteks lengkap muncul.</div>}

        <KpiCard label="Investasi / NPV" value={fmtM(spent)} unit="CAPEX" delta={`NPV ${fmtM(portfolioNPV)} · ROI ${annualROI.toFixed(0)}%`} deltaDir={portfolioNPV >= 0 ? 'up' : 'down'} icon="coins" />
        <KpiCard label="Kesiapan PSPK" value={`${pspkReadiness}`} unit="%" delta={`${pendingComp.length} item pending`} deltaDir={pspkReadiness >= 60 ? 'up' : 'down'} icon="file" />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 16, marginBottom: 16 }}>
        {FIGS.map(f => <React.Fragment key={f[0]}>{chartCard(f[0], f[1], f[2], f[3], f[4])}</React.Fragment>)}

      <div className="card elevated" style={{ marginBottom: 16 }}>
        <div className="card-header"><div><div className="card-title">Opportunity Portfolio Table</div><div className="card-sub">Ranking lengkap · lensa {lens}</div></div>

        </div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12.5 }}>
            <thead><tr style={{ textAlign: 'left', fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>
              <th style={{ padding: '8px' }}>#</th><th style={{ padding: '8px' }}>Opportunity</th><th style={{ padding: '8px', textAlign: 'right' }}>CAPEX</th><th style={{ padding: '8px', textAlign: 'right' }}>Benefit/thn</th><th style={{ padding: '8px', textAlign: 'right' }}>Payback</th><th style={{ padding: '8px', textAlign: 'right' }}>Emisi</th><th style={{ padding: '8px', textAlign: 'right' }}>Skor</th><th style={{ padding: '8px' }}>Decision</th>
            </tr></thead>
            <tbody>
              {items.map((s, i) => (
                <tr key={s.o.id} style={{ borderTop: '1px solid var(--border-soft)' }}>
                  <td style={{ padding: '9px 8px', fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>{i + 1}</td>

                  <td style={{ padding: '9px 8px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{s.capex ? fmtM(s.capex) : '—'}</td>
                  <td style={{ padding: '9px 8px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: '#16A34A' }}>{fmtM(s.benefit)}</td>

                  <button key={k} className={`button ${aiMode === k ? 'primary' : 'ghost'}`} style={{ fontSize: 11, padding: '6px 12px' }} onClick={() => setAiMode(k)}>{MODES[k].label} ({MODES[k].pages} hal)</button>

                  <option value="gpt-5.4-mini">⚡ Good</option>
                  <option value="gpt-5.4">✦ Best</option>

                </select>
                <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 4, lineHeight: 1.4 }}>Good = cepat &amp; hemat · Best = reasoning frontier · Excellent = presisi tertinggi. Best &amp; Excellent butuh API tier berbayar.</div>
              </div>
            </div>
            <div className="field">
              <label className="field-label">Konteks Tambahan (opsional) — data publik / kebijakan / sektor</label>
              <textarea className="field-input" rows={4} value={aiContext} onChange={e => setAiContext(e.target.value)} placeholder="Tempel kebijakan / data sektor / benchmark…" style={{ resize: 'vertical', fontFamily: 'inherit', lineHeight: 1.5 }} />
            </div>
            {!aiText && <div style={{ marginTop: 14 }}><button className="button primary" onClick={generateAI} disabled={aiLoading || !aiKey.trim()} style={{ opacity: (aiLoading || !aiKey.trim()) ? 0.55 : 1, cursor: (aiLoading || !aiKey.trim()) ? 'not-allowed' : 'pointer' }}><Icon name="sparkle" size={12} /><span>{aiLoading ? (aiProgress || 'Menyusun…') : 'Susun laporan BOD (Bagian 4–14)'}</span></button>{!aiKey.trim() && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 8 }}>Masukkan API key OpenAI di atas untuk mengaktifkan tombol ini.</div>}</div>}
          </div>
        )}
        {aiLoading && <div style={{ padding: 16, textAlign: 'center', color: 'var(--text-muted)', fontSize: 13 }}>{aiProgress || 'Menyusun laporan BOD…'}</div>}
        {aiError && <div style={{ marginTop: 12, padding: 12, background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#B91C1C', fontSize: 12.5, lineHeight: 1.5 }}>{aiError}</div>}
        {aiText && !aiLoading && (
          <div style={{ marginTop: 4, color: 'var(--text-body)' }}>
            {renderMarkdown(aiText)}
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: '1px solid var(--border-soft)', fontSize: 10, color: 'var(--text-muted)', fontStyle: 'italic' }}>Disusun AI mengikuti BOD Report Template, berbasis data dashboard lintas-modul + profil. Angka portofolio dari engine deterministik; verifikasi klaim kebijakan/eksternal sebelum keputusan resmi.</div>
          </div>
        )}
      </div>
    </div>
  );
};

const AiCopilot = ({ activeView, profile }) => {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const bodyRef = useRef(null);

  const ctx = AI_RESPONSES[activeView] || AI_RESPONSES.overview;

  useEffect(() => {
    if (open) {
      setMessages([{ from: 'ai', text: ctx.welcome, chips: ctx.chips }]);
    }
  }, [open, activeView]);

  useEffect(() => {
    if (bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [messages, typing]);

  const send = (text) => {
    if (!text.trim()) return;
    const userMsg = { from: 'user', text };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setTyping(true);

    setTimeout(() => {
      const matchedAnswer = AI_ANSWERS[text];
      let response;
      if (matchedAnswer) {
        response = matchedAnswer;
      } else {
        const lower = text.toLowerCase();
        if (lower.includes('npv') || lower.includes('irr')) {
          response = AI_ANSWERS['Apa beda NPV dan IRR?'];
        } else if (lower.includes('scope')) {
          response = AI_ANSWERS['Apa beda Scope 1, 2, 3?'];
        } else if (lower.includes('material')) {
          response = AI_ANSWERS['Apa itu double materiality?'];
        } else if (lower.includes('carbon') || lower.includes('idxcarbon')) {
          response = AI_ANSWERS['Apa itu IDXCarbon?'];
        } else if (lower.includes('risk') || lower.includes('risiko')) {
          response = AI_ANSWERS['Risiko mana yang paling material?'];
        } else if (lower.includes('halo') || lower.includes('hai') || lower.includes('hi')) {
          response = `Hai${profile?.companyName ? ', tim ' + profile.companyName : ''}! Saya CES-GPT, asisten DSS Climate Opportunities. Ada yang bisa saya bantu hari ini?`;
        } else if (lower.includes('terima kasih') || lower.includes('thanks')) {
          response = 'Sama-sama! Selalu siap membantu. Jika ada pertanyaan lain seputar PSPK, IFRS S2, atau peluang iklim, jangan ragu untuk tanya.';
        } else {
          response = `Pertanyaan menarik. Untuk **"${text}"**, saya rekomendasikan Anda lihat halaman terkait di sidebar atau buka **Standards Registry** untuk referensi lengkap. Jika perlu narasi yang lebih spesifik, gunakan modul **Reports** untuk auto-draft sesuai konteks Anda.`;
        }
      }

      setMessages(prev => [...prev, { from: 'ai', text: response }]);
      setTyping(false);
    }, 800 + Math.random() * 600);
  };

  const renderMarkdown = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) => {
      if (p.startsWith('**') && p.endsWith('**')) {
        return <strong key={i}>{p.slice(2, -2)}</strong>;
      }
      return p.split('\n').map((line, li) => (
        <React.Fragment key={`${i}-${li}`}>
          {li > 0 && <br />}{line}
        </React.Fragment>
      ));
    });
  };

  if (!open) {
    return (
      <button className="ai-fab" onClick={() => setOpen(true)} title="Buka CES-GPT">
        <Icon name="sparkle" size={26} />
      </button>
    );
  }

  return (
    <div className="ai-panel">
      <div className="ai-panel-header">
        <button className="ai-panel-close" onClick={() => setOpen(false)} title="Tutup">
          <Icon name="x" size={14} />
        </button>
        <div className="ai-panel-title">
          <Icon name="sparkle" size={18} />
          CES-GPT Co-pilot
        </div>
        <div className="ai-panel-tag">// Climate & PSPK Assistant · v0.4</div>
      </div>
      <div className="ai-panel-body" ref={bodyRef}>
        {messages.map((m, idx) => (
          <React.Fragment key={idx}>
            <div className={`ai-msg ${m.from === 'user' ? 'from-user' : ''}`}>
              <div className="ai-msg-avatar">{m.from === 'user' ? (profile?.companyName ? profile.companyName.charAt(0) : 'U') : 'AI'}</div>
              <div className="ai-msg-bubble">{renderMarkdown(m.text)}</div>
            </div>
            {m.chips && (
              <div className="ai-suggestions">
                {m.chips.map(c => (
                  <button key={c} className="ai-suggestion-chip" onClick={() => send(c)}>{c}</button>
                ))}
              </div>
            )}
          </React.Fragment>
        ))}
        {typing && (
          <div className="ai-msg">
            <div className="ai-msg-avatar">AI</div>
            <div className="ai-msg-bubble">
              <div className="ai-typing"><span></span><span></span><span></span></div>
            </div>
          </div>
        )}
      </div>
      <div className="ai-panel-input">
        <input
          type="text"
          placeholder="Tanya CES-GPT…"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') send(input); }}
        />
        <button onClick={() => send(input)} title="Send">
          <Icon name="send" size={16} />
        </button>
      </div>
    </div>
  );
};

const EsgScore = ({ profile }) => {
  const radarRef = useRef(null);
  const trajectoryRef = useRef(null);

  const pillarScores = useMemo(() => {
    const result = {};
    Object.entries(ESG_RUBRIC).forEach(([key, pillar]) => {
      const avg = pillar.items.reduce((s, it) => s + it.score, 0) / pillar.items.length;
      result[key] = Math.round(avg);
    });
    return result;
  }, []);

  const totalScore = useMemo(() => {
    let weighted = 0;
    Object.entries(ESG_RUBRIC).forEach(([key, pillar]) => {
      weighted += pillarScores[key] * pillar.weight;
    });
    return Math.round(weighted);
  }, [pillarScores]);

  const tier = useMemo(() => {
    if (totalScore >= 80) return { letter: 'A', label: 'Leader', desc: 'Praktik iklim setara emiten papan atas. Posisi kuat untuk akses Green Bond, Sustainability-Linked Loan, dan inklusi indeks ESG global.' };
    if (totalScore >= 65) return { letter: 'B', label: 'Advanced', desc: 'Fondasi PSPK 1-2 solid. Fokus pada verifikasi pihak ketiga & quantification climate VaR untuk naik ke tier Leader.' };
    if (totalScore >= 50) return { letter: 'C', label: 'Developing', desc: 'Compliance dasar tercapai, namun beberapa pillar masih partial. Prioritaskan internal carbon price & Scope 3 expansion.' };
    return { letter: 'D', label: 'Initiating', desc: 'Tahap awal kepatuhan PSPK. Mulai dari governance struktur & inventarisasi Scope 1-2 sebagai foundation.' };
  }, [totalScore]);

  const userRank = useMemo(() => {
    const allScores = [...PEER_RANKINGS.map(p => p.score), totalScore].sort((a, b) => b - a);
    return allScores.indexOf(totalScore) + 1;
  }, [totalScore]);

  const peerAvg = useMemo(() => {
    return Math.round(PEER_RANKINGS.reduce((s, p) => s + p.score, 0) / PEER_RANKINGS.length);
  }, []);

  const fullRanking = useMemo(() => {
    const companyName = profile?.companyName || 'PT Mitra Industri Tbk';

    return combined;

  useEffect(() => {

      type: 'radar',

  useEffect(() => {

      Math.max(44, totalScore - 12),
      Math.max(52, totalScore - 6),
      totalScore,

      type: 'line',
      data: {
        labels: ['Q1 2025', 'Q2 2025', 'Q3 2025', 'Q4 2025', 'Q1 2026', 'Q2 2026'],
        datasets: [{
          label: 'ESG Score',

      <div className="esg-hero">
        <div className="esg-hero-left">
          <div className="esg-score-eyebrow">Skor Keseluruhan · {profile?.companyName || 'PT Mitra Industri Tbk'}</div>
          <div>
            <span className="esg-score-big">{totalScore}</span>
            <span className="esg-score-max">/100</span>
          </div>
          <div className="esg-tier-pill">Tier {tier.letter} · {tier.label}</div>
          <div className="esg-tier-desc">{tier.desc}</div>
          <div className="esg-stats-row">
            <div className="esg-stat">
              <div className="esg-stat-label">Ranking Sektor</div>
              <div className="esg-stat-val">#{userRank}<span className="esg-stat-of">/{PEER_RANKINGS.length + 1}</span></div>
            </div>
            <div className="esg-stat">
              <div className="esg-stat-label">Peer Avg</div>
              <div className="esg-stat-val">{peerAvg}<span className="esg-stat-of">/100</span></div>
            </div>
            <div className="esg-stat">
              <div className="esg-stat-label">Gap to Leader</div>
              <div className="esg-stat-val">{Math.max(0, 80 - totalScore)}<span className="esg-stat-of">pt</span></div>
            </div>

        </div>
        <div className="esg-hero-right">

      <div style={{marginTop: 28}}>
        <div className="section-title">

          <span>Breakdown per Pilar</span>

        <div className="esg-pillar-grid">
          {Object.entries(ESG_RUBRIC).map(([key, pillar]) => (

      ['TCFD', 'Task Force on Climate-related Financial Disclosures', '4 pilar disclosure'],
      ['GRI 305', 'Emissions Standard', 'Scope 1, 2, 3 disclosure'],
      ['SBTi', 'Science-Based Targets initiative', 'Validasi target 1.5°C'],
      ['IDXCarbon', 'Bursa Karbon Indonesia', 'Aktif sejak 2023'],
    ].forEach(([code, name, desc]) => items.push({
      type: 'std', id: code, title: `${code} — ${name}`, desc, tag: 'STD', icon: 'book', goto: 'compliance'
    }));
    // Compliance topics
    [
      ['Governance', 'Tata kelola iklim · Oversight Dewan Komisaris'],
      ['Strategy', 'Strategi iklim · Skenario 1.5°C / 2°C / 3°C'],
      ['Risk Management', 'Identifikasi & assessment risiko iklim'],
      ['Metrics & Targets', 'KPI · Scope 1/2/3 · Carbon intensity'],
      ['Materiality', 'Double materiality assessment'],
      ['Scope 3', 'Value chain emissions · 15 kategori GHG Protocol'],
    ].forEach(([t, d]) => items.push({
      type: 'topic', id: t, title: t, desc: d, tag: 'TOPIC', icon: 'check', goto: 'compliance'
    }));
    return items;
  }, [userRole, OPPS]);

  // Filter
  const results = useMemo(() => {
    if (!query.trim()) return allItems.slice(0, 12);
    const q = query.toLowerCase();
    return allItems.filter(it =>
      it.title.toLowerCase().includes(q) ||
      it.desc.toLowerCase().includes(q) ||
      it.id.toLowerCase().includes(q)
    ).slice(0, 20);
  }, [query, allItems]);

  useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus();
    setActiveIdx(0);
    setQuery('');
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (e.key === 'Escape') { onClose(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, results.length - 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
      else if (e.key === 'Enter') {
        const r = results[activeIdx];
        if (r) handleSelect(r);
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [open, results, activeIdx]);

  const handleSelect = (item) => {
    if (item.type === 'nav') onNavigate(item.id);
    else if (item.goto) onNavigate(item.goto);
    onClose();
  };

  if (!open) return null;

  // Group results by type
  const grouped = {};
  results.forEach(r => { (grouped[r.tag] = grouped[r.tag] || []).push(r); });
  const groupOrder = ['NAV', 'OPP', 'STD', 'TOPIC'];
  const groupNames = { NAV: 'Navigasi', OPP: 'Climate Opportunities', STD: 'Standar & Regulasi', TOPIC: 'Topik Compliance' };

  return (
    <div className="cmd-backdrop" onClick={onClose}>
      <div className="cmd-panel" onClick={e => e.stopPropagation()}>
        <div className="cmd-input-row">
          <Icon name="search" size={18} />
          <input
            ref={inputRef}
            className="cmd-input"
            placeholder="Cari peluang, standar, view, atau topik…"
            value={query}
            onChange={e => { setQuery(e.target.value); setActiveIdx(0); }}
          />
          <kbd style={{fontFamily:'var(--font-mono)',fontSize:'9px',padding:'3px 7px',background:'var(--bg-base)',border:'1px solid var(--border-soft)',borderRadius:'4px',color:'var(--text-muted)'}}>ESC</kbd>
        </div>
        <div className="cmd-results">
          {results.length === 0 ? (
            <div className="cmd-empty">Tidak ada hasil untuk "{query}"</div>
          ) : (
            groupOrder.map(g => grouped[g] && (
              <div key={g}>
                <div className="cmd-section-title">→ {groupNames[g]}</div>
                {grouped[g].map((r, idx) => {
                  const globalIdx = results.indexOf(r);
                  return (
                    <div
                      key={r.type + r.id}
                      className={`cmd-item ${globalIdx === activeIdx ? 'active' : ''}`}
                      onClick={() => handleSelect(r)}
                      onMouseEnter={() => setActiveIdx(globalIdx)}
                    >
                      <div className="cmd-item-icon">
                        <Icon name={r.icon} size={14} />
                      </div>
                      <div className="cmd-item-body">
                        <div className="cmd-item-title">{r.title}</div>
                        <div className="cmd-item-desc">{r.desc}</div>
                      </div>
                      <div className="cmd-item-tag">{r.tag}</div>
                    </div>
                  );
                })}
              </div>
            ))
          )}
        </div>
        <div className="cmd-footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> Navigasi</span>
          <span><kbd>↵</kbd> Pilih</span>
          <span><kbd>ESC</kbd> Tutup</span>
          <span style={{marginLeft:'auto'}}>{results.length} hasil</span>
        </div>
      </div>
    </div>
  );
};

// Sector benchmark data — derived from KPI tracker IESR + OJK emiten study 2025
const SECTOR_BENCHMARKS = {
  'Manufacturing': { disclosure: 58, intensity: 72, commitment: 45, capex: 38, scope12: 80, scope3: 22 },
  'Energy & Utilities': { disclosure: 68, intensity: 55, commitment: 62, capex: 55, scope12: 92, scope3: 38 },
  'Mining & Metals': { disclosure: 65, intensity: 42, commitment: 58, capex: 48, scope12: 88, scope3: 35 },
  'Transportation & Logistics': { disclosure: 48, intensity: 62, commitment: 35, capex: 30, scope12: 70, scope3: 18 },
  'Real Estate & Construction': { disclosure: 52, intensity: 68, commitment: 40, capex: 32, scope12: 65, scope3: 15 },
  'Financial Services': { disclosure: 75, intensity: 88, commitment: 68, capex: 25, scope12: 78, scope3: 42 },
  'Agriculture & Food': { disclosure: 50, intensity: 70, commitment: 38, capex: 28, scope12: 60, scope3: 25 },
  'Consumer Goods': { disclosure: 55, intensity: 75, commitment: 42, capex: 32, scope12: 72, scope3: 20 },
};
const TOP_QUARTILE = { disclosure: 85, intensity: 90, commitment: 80, capex: 72, scope12: 96, scope3: 65 };

const PeerBenchmark = ({ profile }) => {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);

  // Compute user's score based on profile
  const userScore = useMemo(() => {
    if (!profile) return { disclosure: 35, intensity: 50, commitment: 30, capex: 28, scope12: 55, scope3: 12 };
    const decarbScore = Math.min(100, Math.round(profile.decarbTarget * 1.8));
    const capexScore = Math.min(100, Math.round((profile.capexBudget / (profile.totalAsset || 1)) * 1000));
    const baseIntensity = profile.baselineEmission && profile.revenue ? profile.baselineEmission / profile.revenue : 1.5;
    const intensityScore = Math.max(20, Math.min(100, Math.round(80 - baseIntensity * 8)));
    return {
      disclosure: 52,
      intensity: intensityScore,
      commitment: decarbScore,
      capex: capexScore,
      scope12: 68,
      scope3: 18,
    };
  }, [profile]);

  const sector = profile?.industry || 'Manufacturing';
  const benchmark = SECTOR_BENCHMARKS[sector] || SECTOR_BENCHMARKS['Manufacturing'];

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Climate Disclosure', 'Carbon Intensity', 'Decarb Commitment', 'Climate CAPEX', 'Scope 1+2 Coverage', 'Scope 3 Coverage'],
        datasets: [
          {
            label: 'Top Quartile (IDX)',
            data: [TOP_QUARTILE.disclosure, TOP_QUARTILE.intensity, TOP_QUARTILE.commitment, TOP_QUARTILE.capex, TOP_QUARTILE.scope12, TOP_QUARTILE.scope3],
            backgroundColor: 'rgba(252, 211, 77, 0.08)',
            borderColor: 'rgba(252, 211, 77, 0.8)',
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointBackgroundColor: '#FCD34D',
            pointRadius: 3,
          },
          {
            label: `Sektor Median (${sector})`,
            data: [benchmark.disclosure, benchmark.intensity, benchmark.commitment, benchmark.capex, benchmark.scope12, benchmark.scope3],
            backgroundColor: 'rgba(122, 174, 216, 0.18)',
            borderColor: 'rgba(59, 118, 192, 0.6)',
            borderWidth: 2,
            pointBackgroundColor: '#3B76C0',
            pointRadius: 4,
          },
          {
            label: profile?.companyName || 'Posisi Anda',
            data: [userScore.disclosure, userScore.intensity, userScore.commitment, userScore.capex, userScore.scope12, userScore.scope3],
            backgroundColor: 'rgba(90, 170, 237, 0.25)',
            borderColor: '#5AAAED',
            borderWidth: 2.5,
            pointBackgroundColor: '#5AAAED',
            pointRadius: 5,
            pointHoverRadius: 7,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              font: { family: 'Aptos', size: 11 },
              boxWidth: 12,
              padding: 12,
              usePointStyle: true,
              color: '#52525B',
            },
          },
          tooltip: {
            backgroundColor: '#142035',
            titleFont: { family: 'Helvetica Neue', weight: 700, size: 12 },
            bodyFont: { family: 'Aptos', size: 11 },
            padding: 12,
            cornerRadius: 8,
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${ctx.raw}/100`,
            },
          },
        },
        scales: {
          r: {
            min: 0,
            max: 100,
            ticks: {
              stepSize: 20,
              font: { family: 'Aptos', size: 9 },
              color: '#A1A1AA',
              backdropColor: 'transparent',
            },
            grid: { color: 'rgba(59, 118, 192, 0.12)' },
            angleLines: { color: 'rgba(59, 118, 192, 0.18)' },
            pointLabels: {
              font: { family: 'Aptos', size: 11, weight: '600' },
              color: '#27272A',
            },
          },
        },
      },
    });

    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [userScore, benchmark, sector, profile]);

  // Compute average position
  const userAvg = Math.round((userScore.disclosure + userScore.intensity + userScore.commitment + userScore.capex + userScore.scope12 + userScore.scope3) / 6);
  const sectorAvg = Math.round((benchmark.disclosure + benchmark.intensity + benchmark.commitment + benchmark.capex + benchmark.scope12 + benchmark.scope3) / 6);
  const gap = userAvg - sectorAvg;
  const percentile = userAvg >= 75 ? 'Top 25%' : userAvg >= 55 ? 'Top 50%' : userAvg >= 35 ? 'Bottom 50%' : 'Bottom 25%';

  return (
    <div className="peer-card">
      <div className="peer-header">
        <div>
          <div className="section-eyebrow">→ Peer Benchmarking</div>
          <h3 className="section-title" style={{marginBottom:4}}>Posisi vs. Sektor IDX</h3>
          <div style={{fontSize:13,color:'var(--text-muted)'}}>
            Skor agregat 6 dimensi · {sector} · n=42 emiten
          </div>
        </div>
        <div className="status-chip warn" style={{fontFamily:'var(--font-mono)',fontSize:10}}>
          BENCHMARK · 2025
        </div>
      </div>
      <div style={{position:'relative',height:340,marginTop:8}}>
        <canvas ref={canvasRef}></canvas>
      </div>
      <div className="peer-summary">
        <div className="peer-summary-item">
          <div className="peer-summary-label">Skor Anda</div>
          <div className="peer-summary-value">{userAvg}<span style={{fontSize:14,color:'var(--text-muted)'}}>/100</span></div>
          <div className={`peer-summary-tag ${gap > 0 ? 'up' : gap < 0 ? 'down' : 'neutral'}`}>
            {gap > 0 ? `▲ +${gap} dari median` : gap < 0 ? `▼ ${gap} dari median` : '= di median'}
          </div>
        </div>
        <div className="peer-summary-item">
          <div className="peer-summary-label">Median Sektor</div>
          <div className="peer-summary-value">{sectorAvg}<span style={{fontSize:14,color:'var(--text-muted)'}}>/100</span></div>
          <div className="peer-summary-tag neutral">{sector}</div>
        </div>
        <div className="peer-summary-item">
          <div className="peer-summary-label">Persentil</div>
          <div className="peer-summary-value" style={{color:'var(--purple-700)'}}>{percentile}</div>
          <div className="peer-summary-tag neutral">Emiten IDX</div>
        </div>
      </div>
    </div>
  );
};

// =======================================
// DATA STORE — Editable State + LocalStorage Persistence
// =======================================
const DATA_STORAGE_KEY = 'cesgs_dashboard_data_v1';

const safeLoad = (key) => {
  try {
    if (typeof window === 'undefined' || !window.localStorage) return null;
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
};

const safeSave = (key, value) => {
  try {
    if (typeof window === 'undefined' || !window.localStorage) return false;
    window.localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) { return false; }
};

const DEFAULT_INDUSTRIES = INDUSTRIES;

// Generate next ID for collection given prefix
const nextId = (collection, prefix) => {
  const nums = collection
    .map(it => parseInt(String(it.id).replace(/[^0-9]/g, '')))
    .filter(n => !isNaN(n));
  const max = nums.length ? Math.max(...nums) : 0;
  return `${prefix}${String(max + 1).padStart(3, '0')}`;
};

const useDataStore = () => {
  const stored = safeLoad(DATA_STORAGE_KEY) || {};
  const [opportunities, setOpportunities] = useState(stored.opportunities || ALL_OPPORTUNITIES);
  const [complianceItems, setComplianceItems] = useState(stored.complianceItems || COMPLIANCE_ITEMS);
  const [climateRisks, setClimateRisks] = useState(stored.climateRisks || CLIMATE_RISKS);
  const [materialityTopics, setMaterialityTopics] = useState(stored.materialityTopics || MATERIALITY_TOPICS);
  const [scenarios, setScenarios] = useState(stored.scenarios || SCENARIOS);
  const [notifications, setNotifications] = useState(stored.notifications || NOTIFICATIONS);
  const [industries, setIndustries] = useState(stored.industries || DEFAULT_INDUSTRIES);
  // ESG Ratings — persisted separately (shared with login/register)
  const [esgRatings, setEsgRatingsState] = useState(ESG_RATINGS_STORE);
  const [registeredUsers, setRegisteredUsersState] = useState(ACCOUNTS);

  // Persist on any change
  useEffect(() => {
    safeSave(DATA_STORAGE_KEY, {
      opportunities, complianceItems, climateRisks, materialityTopics,
      scenarios, notifications, industries,
    });
  }, [opportunities, complianceItems, climateRisks, materialityTopics, scenarios, notifications, industries]);

  useEffect(() => { saveEsgRatings(esgRatings); ESG_RATINGS_STORE = esgRatings; }, [esgRatings]);
  useEffect(() => { saveAccounts(registeredUsers); ACCOUNTS = registeredUsers; }, [registeredUsers]);

  // Generic CRUD factory
  const makeCRUD = (state, setState, prefix) => ({
    add: (item) => setState(prev => [...prev, { ...item, id: item.id || nextId(prev, prefix) }]),
    update: (id, changes) => setState(prev => prev.map(it => it.id === id ? { ...it, ...changes } : it)),
    remove: (id) => setState(prev => prev.filter(it => it.id !== id)),
    replace: (newList) => setState(newList),
  });

  const setEsgRatings = (fn) => setEsgRatingsState(typeof fn === 'function' ? fn : () => fn);
  const setRegisteredUsers = (fn) => setRegisteredUsersState(typeof fn === 'function' ? fn : () => fn);

  const resetAll = () => {
    try { window.localStorage.removeItem(DATA_STORAGE_KEY); } catch (e) {}
    setOpportunities(ALL_OPPORTUNITIES);
    setComplianceItems(COMPLIANCE_ITEMS);
    setClimateRisks(CLIMATE_RISKS);
    setMaterialityTopics(MATERIALITY_TOPICS);
    setScenarios(SCENARIOS);
    setNotifications(NOTIFICATIONS);
    setIndustries(DEFAULT_INDUSTRIES);
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify({
      opportunities, complianceItems, climateRisks, materialityTopics,
      scenarios, notifications, industries,
      _exportedAt: new Date().toISOString(),
      _version: 1,
    }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cesgs-dashboard-data-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJson = (jsonStr) => {
    try {
      const parsed = JSON.parse(jsonStr);
      if (parsed.opportunities) setOpportunities(parsed.opportunities);
      if (parsed.complianceItems) setComplianceItems(parsed.complianceItems);
      if (parsed.climateRisks) setClimateRisks(parsed.climateRisks);
      if (parsed.materialityTopics) setMaterialityTopics(parsed.materialityTopics);
      if (parsed.scenarios) setScenarios(parsed.scenarios);
      if (parsed.notifications) setNotifications(parsed.notifications);
      if (parsed.industries) setIndustries(parsed.industries);
      return { ok: true };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  };

  return {
    opportunities, complianceItems, climateRisks, materialityTopics,
    scenarios, notifications, industries,
    esgRatings, registeredUsers,
    opp: makeCRUD(opportunities, setOpportunities, 'OPP-'),
    comp: makeCRUD(complianceItems, setComplianceItems, 'C'),
    risk: makeCRUD(climateRisks, setClimateRisks, 'R'),
    mater: makeCRUD(materialityTopics, setMaterialityTopics, 'M'),
    scen: makeCRUD(scenarios, setScenarios, 's'),
    notif: makeCRUD(notifications, setNotifications, 'n'),
    esg: makeCRUD(esgRatings, setEsgRatingsState, 'co'),
    usr: makeCRUD(registeredUsers, setRegisteredUsersState, 'u'),
    setIndustries, setEsgRatings, setRegisteredUsers,
    resetAll, exportJson, importJson,
  };
};

const DataEditModal = ({ open, onClose, onSave, title, fields, initial }) => {

  useEffect(() => {
    if (open) {
      setForm(initial || {});
      setTouched(false);
    }
  }, [open, initial]);

  if (!open) return null;

  const setField = (key, value) => {
    setTouched(true);
    setForm(f => ({ ...f, [key]: value }));
  };

  const handleSave = () => {
    onSave(form);
    onClose();
  };

  return (
    <div className="cmd-backdrop" onClick={onClose} style={{paddingTop:'6vh', alignItems:'flex-start'}}>

              </label>
              {f.type === 'textarea' ? (
                <textarea
                  className="field-input"
                  value={form[f.key] ?? ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder}
                  rows={f.rows || 3}

                <select
                  className="field-input"
                  value={form[f.key] ?? ''}

                  style={{width:'100%', padding:'10px 12px', fontSize:13, fontFamily:'var(--font-body)', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background:'var(--bg-card)'}}
                >
                  <option value="">— pilih —</option>
                  {f.options.map(o => (
                    <option key={typeof o === 'object' ? o.value : o} value={typeof o === 'object' ? o.value : o}>
                      {typeof o === 'object' ? o.label : o}
                    </option>
                  ))}
                </select>
              ) : f.type === 'multiselect' ? (
                <div style={{display:'flex', flexWrap:'wrap', gap:6, padding:'8px 10px', border:'1px solid var(--border-default)', borderRadius:'var(--radius-md)', background:'var(--bg-card)'}}>
                  {f.options.map(o => {
                    const arr = form[f.key] || [];
                    const checked = arr.includes(o);
                    return (
                      <span
                        key={o}
                        onClick={() => setField(f.key, checked ? arr.filter(x => x !== o) : [...arr, o])}
                        style={{
                          fontSize:11, padding:'4px 10px', borderRadius:6, cursor:'pointer',
                          border: '1px solid ' + (checked ? 'var(--purple-500)' : 'var(--border-soft)'),
                          background: checked ? 'var(--purple-100)' : 'var(--bg-base)',
                          color: checked ? 'var(--purple-700)' : 'var(--text-secondary)',
                          fontWeight: checked ? 600 : 500,
                        }}
                      >{o}</span>
                    );
                  })}
                </div>
              ) : f.type === 'checkbox' ? (
                <label style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', padding:'8px 0'}}>
                  <input
                    type="checkbox"
                    checked={!!form[f.key]}
                    onChange={e => setField(f.key, e.target.checked)}

                  />

                </label>
              ) : f.type === 'number' ? (
                <input
                  type="number"
                  className="field-input"
                  value={form[f.key] ?? ''}
                  onChange={e => setField(f.key, e.target.value === '' ? '' : parseFloat(e.target.value))}
                  placeholder={f.placeholder}
                  step={f.step || 'any'}

                  placeholder={f.placeholder}

                />
              )}
              {f.hint && <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>{f.hint}</div>}
            </div>
          ))}
        </div>
        <div style={{padding:'14px 22px', borderTop:'1px solid var(--border-soft)', display:'flex', gap:10, justifyContent:'flex-end', background:'var(--bg-base)'}}>
          <button className="button outline" onClick={onClose}>
            <span>Batal</span>
          </button>
          <button className="button primary" onClick={handleSave}>
            <Icon name="check" size={12} />
            <span>{initial && initial.id ? 'Simpan Perubahan' : 'Tambahkan'}</span>
          </button>
        </div>
      </div>
    </div>
  );
};

  const [activeTab, setActiveTab] = useState('opportunities');
  const [editing, setEditing] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const fileInputRef = React.useRef(null);
  const FIELDS = useMemo(() => buildFields(dataStore.industries), [dataStore.industries]);

  const tabs = [
    { id: 'opportunities', label: 'Opportunities', icon: 'leaf', data: dataStore.opportunities, crud: dataStore.opp, fields: FIELDS.opportunity, prefix: 'OPP-',
      columns: [
        { key: 'id', label: 'ID', width: 80 },
        { key: 'title', label: 'Judul', width: 'auto' },
        { key: 'category', label: 'Kategori', width: 140 },
        { key: 'priority', label: 'Prio', width: 70 },
        { key: 'capex', label: 'CAPEX', width: 90, fmt: v => v ? `Rp ${v}M` : '—' },
        { key: 'payback', label: 'Payback', width: 80, fmt: v => v ? `${v} thn` : '—' },
      ] },
    { id: 'compliance', label: 'Compliance', icon: 'check', data: dataStore.complianceItems, crud: dataStore.comp, fields: FIELDS.compliance, prefix: 'C',
      columns: [
        { key: 'id', label: 'ID', width: 60 },
        { key: 'section', label: 'Section', width: 90 },
        { key: 'title', label: 'Indikator', width: 'auto' },
        { key: 'ref', label: 'Ref', width: 100 },
        { key: 'done', label: 'Status', width: 80, fmt: v => v ? '✓ Done' : '○ Pending' },
      ] },
    { id: 'risk', label: 'Risk Register', icon: 'shield', data: dataStore.climateRisks, crud: dataStore.risk, fields: FIELDS.risk, prefix: 'R',
      columns: [
        { key: 'id', label: 'ID', width: 60 },
        { key: 'type', label: 'Tipe', width: 90 },
        { key: 'name', label: 'Nama', width: 'auto' },
        { key: 'x', label: 'L', width: 50 },
        { key: 'y', label: 'I', width: 50 },
        { key: 'time', label: 'Horizon', width: 130 },
      ] },
    { id: 'materiality', label: 'Materiality', icon: 'target', data: dataStore.materialityTopics, crud: dataStore.mater, fields: FIELDS.materiality, prefix: 'M',
      columns: [
        { key: 'id', label: 'ID', width: 60 },
        { key: 'name', label: 'Topik', width: 'auto' },
        { key: 'category', label: 'Pilar', width: 80 },
        { key: 'impactX', label: 'IM', width: 70 },
        { key: 'finY', label: 'FM', width: 70 },
      ] },
    { id: 'scenario', label: 'Scenarios', icon: 'globe', data: dataStore.scenarios, crud: dataStore.scen, fields: FIELDS.scenario, prefix: 's',
      columns: [
        { key: 'id', label: 'ID', width: 80 },
        { key: 'name', label: 'Skenario', width: 'auto' },
        { key: 'tempC', label: 'Suhu', width: 80, fmt: v => `${v}°C` },
        { key: 'pathway', label: 'Pathway', width: 200 },
      ] },
    { id: 'notification', label: 'Notifications', icon: 'bell', data: dataStore.notifications, crud: dataStore.notif, fields: FIELDS.notification, prefix: 'n',
      columns: [
        { key: 'id', label: 'ID', width: 60 },
        { key: 'time', label: 'Waktu', width: 120 },
        { key: 'title', label: 'Judul', width: 'auto' },
        { key: 'unread', label: 'Status', width: 80, fmt: v => v ? '● Unread' : '○ Read' },
      ] },
  ];

  const current = tabs.find(t => t.id === activeTab);

  // Flatten scenario carbonPx for form
  const flatten = (item) => {
    if (activeTab === 'scenario' && item && item.carbonPx) {
      return { ...item, carbonPx2030: item.carbonPx['2030'], carbonPx2040: item.carbonPx['2040'], carbonPx2050: item.carbonPx['2050'] };
    }
    return item;
  };
  const unflatten = (form) => {
    if (activeTab === 'scenario') {
      const { carbonPx2030, carbonPx2040, carbonPx2050, ...rest } = form;
      return { ...rest, carbonPx: { '2030': Number(carbonPx2030) || 0, '2040': Number(carbonPx2040) || 0, '2050': Number(carbonPx2050) || 0 } };
    }
    return form;
  };

  const handleEdit = (item) => {
    setEditing(flatten(item));
    setModalOpen(true);
  };

  const handleAdd = () => {
    const draft = activeTab === 'compliance' ? { section: 'PSPK 2', done: false }
      : activeTab === 'risk' ? { type: 'physical', x: 3, y: 3 }
      : activeTab === 'notification' ? { icon: 'bell', tone: '', unread: true, time: 'Baru saja' }
      : activeTab === 'scenario' ? { color: '#3B76C0', carbonPx2030: 0, carbonPx2040: 0, carbonPx2050: 0 }
      : activeTab === 'opportunity' || activeTab === 'opportunities' ? { priority: 'medium', industries: [] }
      : activeTab === 'materiality' ? { category: 'env', impactX: 3, finY: 3 }
      : {};
    setEditing(draft);
    setModalOpen(true);
  };

  const handleSave = (form) => {
    const data = unflatten(form);
    if (data.id && current.data.find(it => it.id === data.id)) {
      current.crud.update(data.id, data);
    } else {
      current.crud.add(data);
    }
  };

  const handleDelete = (id) => {
    if (window.confirm(`Hapus item ${id}? Tindakan ini bisa di-undo via Reset to Defaults.`)) {
      current.crud.remove(id);
    }
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      const result = dataStore.importJson(evt.target.result);
      if (result.ok) alert('Data berhasil di-import.');
      else alert('Import gagal: ' + result.error);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">// Administration · Master Data Editor</div>
        <h1 className="page-title">Data Editor</h1>
        <p className="page-sub">
          Edit, tambah, dan hapus semua data master dashboard. Perubahan disimpan otomatis ke browser local storage dan
          langsung terefleksi di semua view user.
        </p>
      </div>

      <div className="card elevated" style={{marginBottom:20, padding:'16px 20px'}}>
        <div style={{display:'flex', gap:10, flexWrap:'wrap', alignItems:'center'}}>
          <div style={{flex:1, minWidth:200}}>
            <div style={{fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--text-muted)', marginBottom:4}}>
              → Persistence
            </div>
            <div style={{fontSize:13, color:'var(--text-secondary)'}}>
              Auto-save ke <code style={{fontFamily:'var(--font-mono)', fontSize:11, background:'var(--purple-50)', padding:'1px 5px', borderRadius:3}}>localStorage</code> · Reload page = data masih ada
            </div>
          </div>
          <button className="button outline" onClick={dataStore.exportJson}>
            <Icon name="download" size={12} /><span>Export JSON</span>
          </button>
          <button className="button outline" onClick={() => fileInputRef.current?.click()}>
            <Icon name="file" size={12} /><span>Import JSON</span>
          </button>
          <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} style={{display:'none'}} />
          <button className="button outline" onClick={() => setShowResetConfirm(true)} style={{borderColor:'var(--rose-glow)', color:'var(--rose-glow)'}}>
            <Icon name="trash" size={12} /><span>Reset to Defaults</span>
          </button>
        </div>
      </div>

      <div className="tabs" style={{marginTop:0, marginBottom:0, flexWrap:'wrap'}}>
        {tabs.map(t => (
          <button key={t.id} className={`tab ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
            <span>→ {t.label}</span>
            <span style={{marginLeft:6, padding:'1px 6px', background:'var(--purple-100)', color:'var(--purple-700)', borderRadius:4, fontSize:9, fontWeight:700}}>{t.data.length}</span>
          </button>
        ))}
      </div>

      <div className="card elevated">
        <div className="card-header">
          <div>
            <div className="card-title">{current.label} ({current.data.length})</div>
            <div className="card-sub">Klik baris untuk edit · Hover untuk lihat tombol hapus</div>
          </div>
          <button className="button primary" onClick={handleAdd}>
            <Icon name="sparkle" size={12} /><span>Tambah {current.label}</span>
          </button>
        </div>

        <div style={{overflowX:'auto', margin:'12px -20px -20px', borderTop:'1px solid var(--border-soft)'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:13}}>
            <thead>
              <tr style={{background:'var(--bg-base)', borderBottom:'1px solid var(--border-default)'}}>
                {current.columns.map(c => (
                  <th key={c.key} style={{textAlign:'left', padding:'10px 14px', fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--text-muted)', width: c.width === 'auto' ? undefined : c.width}}>
                    {c.label}
                  </th>
                ))}
                <th style={{width: 100, textAlign:'right', padding:'10px 14px', fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-muted)'}}>Aksi</th>
              </tr>
            </thead>
            <tbody>
              {current.data.length === 0 ? (
                <tr><td colSpan={current.columns.length + 1} style={{padding:40, textAlign:'center', color:'var(--text-muted)'}}>Belum ada data. Klik "Tambah" untuk menambahkan.</td></tr>
              ) : current.data.map((item, idx) => (
                <tr key={item.id || idx} className="data-row" style={{borderBottom:'1px solid var(--border-soft)'}}>
                  {current.columns.map(c => (
                    <td key={c.key} style={{padding:'10px 14px', fontFamily: c.key === 'id' ? 'var(--font-mono)' : 'var(--font-body)', fontSize: c.key === 'id' ? 11 : 13, color: c.key === 'id' ? 'var(--purple-700)' : 'var(--text-primary)'}}>
                      {c.fmt ? c.fmt(item[c.key]) : (item[c.key] !== undefined && item[c.key] !== null ? String(item[c.key]).slice(0, 80) : '—')}
                    </td>
                  ))}
                  <td style={{padding:'8px 14px', textAlign:'right'}}>
                    <button className="icon-button" style={{width:28, height:28, display:'inline-flex'}} onClick={() => handleEdit(item)} title="Edit"><Icon name="edit" size={12} /></button>
                    <button className="icon-button" style={{width:28, height:28, marginLeft:4, display:'inline-flex', color:'var(--rose-glow)', borderColor:'rgba(90,170,237,0.3)'}} onClick={() => handleDelete(item.id)} title="Hapus"><Icon name="trash" size={12} /></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <DataEditModal
        open={modalOpen}
        onClose={() => setModalOpen(false)}
        onSave={handleSave}
        title={editing && editing.id ? `Edit ${current.label}` : `Tambah ${current.label}`}
        fields={current.fields}
        initial={editing}
      />

      {showResetConfirm && (
        <div className="cmd-backdrop" onClick={() => setShowResetConfirm(false)} style={{alignItems:'center', paddingTop:0}}>
          <div className="cmd-panel" onClick={e => e.stopPropagation()} style={{width:'min(440px, 92vw)', padding:28, textAlign:'center'}}>
            <div style={{width:56, height:56, borderRadius:14, background:'rgba(90,170,237,0.12)', display:'inline-flex', alignItems:'center', justifyContent:'center', color:'var(--rose-glow)', marginBottom:14}}>
              <Icon name="alert" size={24} />
            </div>
            <h3 style={{fontFamily:'var(--font-display)', fontSize:18, marginBottom:8}}>Reset Semua Data?</h3>
            <p style={{fontSize:13, color:'var(--text-muted)', marginBottom:20, lineHeight:1.5}}>
              Semua perubahan kustom (opportunities, risks, scenarios, dll.) akan dihapus dan data default akan dikembalikan.
              Action ini permanent.
            </p>
            <div style={{display:'flex', gap:10, justifyContent:'center'}}>
              <button className="button outline" onClick={() => setShowResetConfirm(false)}>Batal</button>
              <button className="button primary" style={{background:'var(--rose-glow)', borderColor:'var(--rose-glow)'}} onClick={() => { dataStore.resetAll(); setShowResetConfirm(false); }}>
                Ya, Reset Semua
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// MAIN APP
// =======================================
const App = () => {
  const [user, setUser] = useState(null);
  const [activeView, setActiveView] = useState('overview');
  const [profile, setProfile] = useState(null);
  const [toast, setToast] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);

  // Editable data store with localStorage persistence
  const dataStore = useDataStore();

  // Global keyboard shortcut: Cmd+K / Ctrl+K → open command palette
  useEffect(() => {
    if (!user) return;
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdOpen(v => !v);
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [user]);

  // Filter opportunities by user profile industry (from editable store)
  const filteredOpportunities = useMemo(() => {
    if (!profile) return dataStore.opportunities.slice(0, 8);
    return dataStore.opportunities.filter(o => (o.industries || []).includes(profile.industry));
  }, [profile, dataStore.opportunities]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 3000);
  };

  const handleLogin = (account) => {
    setUser(account);
    setActiveView(account.role === 'superadmin' ? 'admin-overview' : 'overview');
    setProfile(null);
  };

  const handleLogout = () => {
    setUser(null);
    setProfile(null);
    setActiveView('overview');
  };

  if (!user) return <LoginScreen onLogin={handleLogin} />;

  const renderView = () => {
    if (user.role === 'superadmin') {
      switch (activeView) {
        case 'admin-overview': return <AdminOverview />;
        case 'admin-users': return <AdminUsers dataStore={dataStore} />;
        case 'admin-companies': return <AdminCompanies dataStore={dataStore} />;
        case 'admin-esg-ratings': return <AdminEsgRatings dataStore={dataStore} />;
        case 'admin-opportunities': return <AdminOppDB dataStore={dataStore} setActiveView={setActiveView} />;
        case 'admin-data': return <AdminDataEditor dataStore={dataStore} />;
        case 'admin-market': return <AdminMarket />;
        case 'admin-standards': return <AdminStandards />;
        case 'admin-analytics': return <AdminAnalytics />;
        default: return <AdminOverview />;
      }
    }
    switch (activeView) {
      case 'overview': return <UserOverview profile={profile} opportunities={filteredOpportunities} setActiveView={setActiveView} />;
      case 'exec-summary': return <ExecutiveSummary profile={profile} opportunities={filteredOpportunities} setActiveView={setActiveView} />;
      case 'profile': return <CompanyProfile profile={profile} setProfile={setProfile} showToast={showToast} industries={dataStore.industries} />;
      case 'opportunities': return <Opportunities profile={profile} opportunities={filteredOpportunities} allOpportunities={dataStore.opportunities} setActiveView={setActiveView} dataStore={dataStore} />;
      case 'esg-rating': return <EsgRating profile={profile} esgRatings={dataStore.esgRatings} />;
      case 'emissions': return <GhgCalculator profile={profile} />;
      case 'risks': return <RiskHeatmap profile={profile} climateRisks={dataStore.climateRisks} materialityTopics={dataStore.materialityTopics} riskCrud={dataStore.risk} materCrud={dataStore.mater} industries={dataStore.industries} />;
      case 'scenarios': return <ScenarioAnalysis profile={profile} scenarios={dataStore.scenarios} scenCrud={dataStore.scen} />;
      case 'roadmap': return <RoadmapPlanner profile={profile} opportunities={filteredOpportunities} />;
      case 'peer-benchmark': return (
        <div className="page">
          <div className="page-header">
            <div className="page-eyebrow">// Analytics · Benchmarking</div>
            <h1 className="page-title">Peer Benchmark</h1>
            <p className="page-sub">
              Posisi {profile ? <strong>{profile.companyName}</strong> : 'perusahaan Anda'} dibandingkan dengan median sektor dan top quartile emiten IDX
              pada 6 dimensi kunci climate readiness.
            </p>
          </div>
          <PeerBenchmark profile={profile} />
        </div>
      );
      case 'feasibility': return <Feasibility opportunities={filteredOpportunities} profile={profile} />;
      default: return <UserOverview profile={profile} opportunities={filteredOpportunities} setActiveView={setActiveView} />;
    }
  };

  return (
    <div className="app-shell-v2">
      <TopNav
        user={user}
        activeView={activeView}
        setActiveView={setActiveView}
        onLogout={handleLogout}
        onOpenSearch={() => setCmdOpen(true)}
        notifications={dataStore.notifications}
        updateNotif={dataStore.notif.update}
        mobileOpen={mobileOpen}
        setMobileOpen={setMobileOpen}
      />
      <main className="main-area-v2">
        {renderView()}
      </main>
      {toast && (
        <div className="toast">
          <Icon name="check" size={14} />
          <span>{toast}</span>
        </div>
      )}
      {user.role !== 'superadmin' && <AiCopilot activeView={activeView} profile={profile} />}
      <CommandPalette
        open={cmdOpen}
        onClose={() => setCmdOpen(false)}
        onNavigate={(view) => { setActiveView(view); setCmdOpen(false); }}
        userRole={user.role}
        opportunities={dataStore.opportunities}
      />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
